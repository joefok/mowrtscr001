<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌈 扔彩虹 · 甩手投掷</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; touch-action:none; -webkit-tap-highlight-color: transparent; }
    body {
        height: 100vh; width: 100vw; overflow: hidden;
        background: #0a001f; font-family: 'Press Start 2P', cursive;
        color: #fff;
    }
    canvas { display: block; }
    .hud {
        position: absolute; top: 12px; left: 12px; z-index: 20;
        background: rgba(0,0,0,0.8); padding: 10px 14px; border-radius: 8px;
        font-size: 11px; line-height: 1.6;
        border: 1px solid rgba(255,215,0,0.2);
        pointer-events: none;
    }
    .hud .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .hud .score { color: #ffd700; }
    .hud .power-wrap { display: flex; justify-content: space-between; margin-top: 2px; }
    .state-badge {
        position: absolute; top: 12px; right: 12px; z-index: 20;
        font-size: 10px; padding: 8px 12px; border-radius: 20px;
        background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.15);
        transition: all 0.25s;
    }
    .state-badge.ready { color: #66ff99; border-color: rgba(102,255,153,0.5); }
    .state-badge.wait { color: #ff8866; border-color: rgba(255,136,102,0.5); }
    .state-badge.flying { color: #ffdd44; border-color: rgba(255,221,68,0.5); }
    .controls {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 20; display: flex; gap: 12px;
    }
    .controls button {
        background: rgba(255,215,0,0.15); border: 2px solid #ffd700;
        color: #ffd700; padding: 10px 18px;
        font-family: 'Press Start 2P', cursive; font-size: 10px;
        border-radius: 30px; cursor: pointer;
        backdrop-filter: blur(4px);
        transition: all 0.2s;
        touch-action: manipulation;
    }
    .controls button:active { transform: scale(0.94); background: rgba(255,215,0,0.3); }
    .controls button.disabled {
        opacity: 0.35; border-color: rgba(255,215,0,0.35); color: rgba(255,215,0,0.5);
        pointer-events: none;
    }
    .combo {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
        z-index: 15; font-size: 40px; color: #ffdd44;
        text-shadow: 0 0 40px rgba(255,220,0,0.6);
        pointer-events: none; opacity: 0;
        transition: opacity 0.2s;
    }
    .combo.show { opacity: 1; animation: pop 0.5s ease-out; }
    @keyframes pop {
        0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
        50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
        100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    }
    .hint {
        position: absolute; bottom: 82px; left: 50%; transform: translateX(-50%);
        z-index: 12; font-size: 10px; color: rgba(255,215,0,0.6);
        background: rgba(0,0,0,0.45); padding: 6px 16px;
        border-radius: 20px; backdrop-filter: blur(2px);
        border: 1px solid rgba(255,215,0,0.1);
        white-space: nowrap; text-align: center;
        animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

    .overlay {
        position: absolute; inset: 0; z-index: 50;
        background: radial-gradient(circle at 50% 40%, #1a0838, #04000f);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; text-align: center; padding: 24px;
    }
    .overlay h1 { font-size: 16px; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); line-height: 1.6; }
    .overlay p { font-size: 10px; color: rgba(255,255,255,0.75); line-height: 1.8; max-width: 320px; }
    .overlay button {
        background: linear-gradient(135deg, #ffd700, #ff9900);
        border: none; color: #1a0e00; padding: 14px 26px;
        font-family: 'Press Start 2P', cursive; font-size: 11px;
        border-radius: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(255,180,0,0.4);
    }
    .overlay button:active { transform: scale(0.96); }
    .overlay .sub { font-size: 9px; color: rgba(255,255,255,0.4); }

    @media (max-width:500px) {
        .hud { font-size: 9px; padding: 6px 10px; }
        .hud .row { gap: 6px; }
        .state-badge { font-size: 9px; padding: 6px 10px; }
        .controls button { font-size: 8px; padding: 8px 14px; }
        .combo { font-size: 28px; }
        .hint { font-size: 9px; bottom: 74px; white-space: normal; }
        .overlay h1 { font-size: 13px; }
    }
</style>
</head>
<body>

<div class="overlay" id="startOverlay" style="display:none;">
    <h1>🌈 扔彩虹<br>甩手投掷</h1>
    <p>把手机当作真的硬币来甩：<br>手握稳，向前快速一甩，<br>硬币就会滑向桌子远端的彩虹靶。<br>力度太轻滑不到，太重会冲过头弹回来。</p>
    <button id="startBtn">📳 开始 · 授权动作感应</button>
    <div class="sub" id="startSub">需要动作感应权限才能甩动投掷</div>
</div>

<div class="hud" id="hud">
    <div class="row">
        <span>🔴 <span id="red" class="score">0</span></span>
        <span>🟢 <span id="green" class="score">0</span></span>
        <span>🟡 <span id="yellow" class="score">0</span></span>
        <span>🟣 <span id="purple" class="score">0</span></span>
    </div>
    <div class="power-wrap">
        <span>⚡ <span id="power">0</span></span>
    </div>
</div>

<div class="state-badge wait" id="stateBadge">🤳 稳住手机…</div>

<div class="combo" id="comboDisplay"></div>
<div class="hint" id="hint">🤳 稳住手机 2 秒 → 快速向前甩动投掷</div>

<div class="controls">
    <button id="cleanBtn" class="disabled" onclick="cleanDesk()">🧹 清桌</button>
</div>

<canvas id="canvas"></canvas>

<script>
    // ============================================================
    //  Canvas & basic setup
    // ============================================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let coinStartX, coinStartY;
    let target = { x: 0, y: 0 };

    function layout() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
        coinStartX = W * 0.5;
        coinStartY = H * 0.90;
        target.x = W * 0.5;
        target.y = H * 0.22;
    }

    // ============================================================
    //  Game state
    // ============================================================
    let coins = [];               // landed coins: {x,y,landedAt}
    let scores = { red: 0, green: 0, yellow: 0, purple: 0 };
    let powerValue = 0;
    let isThrowing = false;
    let comboCount = 0;
    let lastHitTime = 0;
    const comboEl = document.getElementById('comboDisplay');
    const stateBadge = document.getElementById('stateBadge');
    const cleanBtn = document.getElementById('cleanBtn');

    // Rings, outer to inner. Radii are relative to the smaller screen dimension.
    const RING_DEFS = [
        { label: 'red',    pts: 1, color: '#ff2244', frac: 0.150 },
        { label: 'green',  pts: 2, color: '#33ff77', frac: 0.112 },
        { label: 'yellow', pts: 3, color: '#ffdd33', frac: 0.076 },
        { label: 'purple', pts: 5, color: '#aa44ff', frac: 0.040 }
    ];
    let RINGS = [];
    function computeRings() {
        const base = Math.min(W, H);
        RINGS = RING_DEFS.map(r => ({ ...r, radius: base * r.frac }));
    }

    // ============================================================
    //  Drawing helpers
    // ============================================================
    function drawTable() {
        ctx.fillStyle = '#0a001f';
        ctx.fillRect(0, 0, W, H);

        const deskTop = H * 0.10;
        // trapezoid desk, narrow at top (far / 3m away) wide at bottom (near player)
        const topHalf = W * 0.28;
        const botHalf = W * 0.62;
        const grad = ctx.createLinearGradient(0, deskTop, 0, H);
        grad.addColorStop(0, '#241608');
        grad.addColorStop(1, '#3a281a');
        ctx.beginPath();
        ctx.moveTo(W / 2 - topHalf, deskTop);
        ctx.lineTo(W / 2 + topHalf, deskTop);
        ctx.lineTo(W / 2 + botHalf, H);
        ctx.lineTo(W / 2 - botHalf, H);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // faint depth lines
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let i = 1; i < 5; i++) {
            const t = i / 5;
            const y = deskTop + (H - deskTop) * t;
            const half = topHalf + (botHalf - topHalf) * t;
            ctx.beginPath();
            ctx.moveTo(W / 2 - half, y);
            ctx.lineTo(W / 2 + half, y);
            ctx.stroke();
        }

        const glow = ctx.createLinearGradient(0, deskTop, 0, H);
        glow.addColorStop(0, 'rgba(255,100,255,0.10)');
        glow.addColorStop(0.5, 'rgba(100,200,255,0.06)');
        glow.addColorStop(1, 'rgba(255,200,100,0.04)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, deskTop, W, H - deskTop);
    }

    function drawTarget() {
        for (let i = 0; i < RINGS.length; i++) {
            ctx.beginPath();
            ctx.arc(target.x, target.y, RINGS[i].radius, 0, Math.PI * 2);
            ctx.fillStyle = RINGS[i].color;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(target.x, target.y, RINGS[RINGS.length - 1].radius * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
    }

    function drawCoin(x, y, scale = 1, glow = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        if (glow > 0) {
            const g = ctx.createRadialGradient(0, 0, 8, 0, 0, 40 + glow * 15);
            g.addColorStop(0, `rgba(255,215,0,${0.12 * glow})`);
            g.addColorStop(1, 'rgba(255,215,0,0)');
            ctx.beginPath();
            ctx.arc(0, 0, 40 + glow * 15, 0, Math.PI * 2);
            ctx.fillStyle = g;
            ctx.fill();
        }
        const grad = ctx.createRadialGradient(-6, -8, 4, 0, 0, 22);
        grad.addColorStop(0, '#ffe066');
        grad.addColorStop(0.6, '#ffd700');
        grad.addColorStop(1, '#b8860b');
        ctx.beginPath();
        ctx.arc(0, 0, 20, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = '#a67c00';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(-5, -7, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();
        ctx.restore();
    }

    // transient particles
    let particles = [];
    function emitParticles(x, y, count, color, spread = 3, life = 30) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * spread;
            particles.push({
                x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                size: 2 + Math.random() * 5, color, life, maxLife: life
            });
        }
    }
    function updateAndDrawParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
            const alpha = Math.max(0, p.life / p.maxLife);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    // popup text
    let popups = [];
    function addPopup(x, y, text, color) {
        popups.push({ x, y, text, color, life: 55, maxLife: 55, vy: -1.6 });
    }
    function updateAndDrawPopups() {
        for (let i = popups.length - 1; i >= 0; i--) {
            const p = popups[i];
            p.y += p.vy; p.vy *= 0.97; p.life--;
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.font = 'bold 20px "Press Start 2P", cursive';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = p.color + '80';
            ctx.shadowBlur = 18;
            ctx.fillText(p.text, p.x, p.y);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            if (p.life <= 0) popups.splice(i, 1);
        }
    }

    // ============================================================
    //  Flying coin (friction slide, not gravity arc)
    // ============================================================
    let flying = null; // {x,y,vx,vy,frame}

    function performThrow(power, aimVX) {
        if (isThrowing) return;
        isThrowing = true;
        updateStateBadge();

        // Scale the throw distance to the ACTUAL on-screen distance between
        // the coin's start position and the target, so it works regardless
        // of screen size. power=0 clearly falls short; power=100 slightly
        // overshoots the target (so max force isn't automatically a bullseye
        // - that's the risk/reward).
        const deskDistance = coinStartY - target.y;
        const minDist = deskDistance * 0.30;
        const maxDist = deskDistance * 1.18;
        const p = Math.max(0, Math.min(100, power)) / 100;
        const travelDist = minDist + (maxDist - minDist) * p;

        const friction = 0.965;
        const speed = travelDist * (1 - friction); // v0 such that sum(v0*friction^n) ~= travelDist

        flying = {
            x: coinStartX,
            y: coinStartY,
            vx: aimVX,
            vy: -speed,
            frame: 0
        };
        document.getElementById('power').textContent = Math.floor(power);
    }

    function updateFlying() {
        if (!flying) return;
        const f = flying;

        // trail particles
        if (f.frame % 2 === 0) emitParticles(f.x, f.y, 2, '#ffd700', 1.2, 20);

        f.x += f.vx;
        f.y += f.vy;

        // friction slide (table drag)
        const friction = 0.965;
        f.vx *= friction;
        f.vy *= friction;

        // side rails bounce
        const railMargin = W * 0.06;
        if (f.x < railMargin) { f.x = railMargin; f.vx = -f.vx * 0.6; emitParticles(f.x, f.y, 6, '#ff9966', 2, 18); }
        if (f.x > W - railMargin) { f.x = W - railMargin; f.vx = -f.vx * 0.6; emitParticles(f.x, f.y, 6, '#ff9966', 2, 18); }

        // far rail (back edge of table) - overshoot bounces back
        const farEdge = H * 0.08;
        if (f.y < farEdge) { f.y = farEdge; f.vy = -f.vy * 0.45; emitParticles(f.x, f.y, 8, '#ff6688', 2, 20); }

        // near rail (can't come back past the player)
        if (f.y > coinStartY + 10) { f.y = coinStartY + 10; f.vy = -f.vy * 0.3; }

        f.frame++;

        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.frame * 0.22);
        drawCoin(0, 0, 0.9 + Math.sin(f.frame * 0.15) * 0.03);
        ctx.restore();

        const speed = Math.hypot(f.vx, f.vy);
        if (speed < 0.35) {
            landCoin(f.x, f.y);
            flying = null;
        }
    }

    function landCoin(x, y) {
        const landX = Math.min(W - 6, Math.max(6, x));
        const landY = Math.min(H - 6, Math.max(6, y));
        coins.push({ x: landX, y: landY, landedAt: Date.now() });
        emitParticles(landX, landY, 16, '#b8942a', 3, 26);

        const d = Math.hypot(target.x - landX, target.y - landY);
        let ringHit = null;
        for (let i = RINGS.length - 1; i >= 0; i--) {
            if (d < RINGS[i].radius) { ringHit = RINGS[i]; break; }
        }

        if (ringHit) {
            scores[ringHit.label] += ringHit.pts;
            document.getElementById(ringHit.label).textContent = scores[ringHit.label];

            const now = Date.now();
            comboCount = (now - lastHitTime < 1800) ? comboCount + 1 : 1;
            lastHitTime = now;

            if (comboCount >= 2) {
                const txt = comboCount >= 5 ? `🔥 ${comboCount}x` : comboCount >= 3 ? `✨ ${comboCount}x` : `${comboCount}x`;
                comboEl.textContent = txt;
                comboEl.className = 'combo show';
                clearTimeout(comboEl._timer);
                comboEl._timer = setTimeout(() => comboEl.className = 'combo', 800);
            }

            emitParticles(landX, landY, 36, ringHit.color, 5, 42);
            emitParticles(landX, landY, 18, '#fff', 3, 24);
            addPopup(landX, landY - 30, `+${ringHit.pts}`, ringHit.color);
        } else {
            addPopup(landX, landY - 30, '✗', '#ff6666');
            comboCount = 0;
            comboEl.className = 'combo';
            emitParticles(landX, landY, 10, '#888', 2, 18);
        }

        setTimeout(() => {
            isThrowing = false;
            powerValue = 0;
            document.getElementById('power').textContent = '0';
            updateStateBadge();
        }, 250);
    }

    // ============================================================
    //  Motion-sensor throw detection
    // ============================================================
    const motion = {
        supported: false,
        active: false,
        state: 'wait',      // 'wait' -> holding steady to calibrate, 'ready' -> armed, 'cooldown' -> after a throw
        source: null,       // 'rotation' | 'linear' | 'gravity' - locked in once, never switched mid-session
        variance: 1,        // rolling variance (noise floor) while steady
        steadyStreak: 0,
        lastAimSign: 1,
        lastEventTime: 0,
        debug: true
    };

    const debugEl = document.createElement('div');
    debugEl.style.cssText = 'position:absolute;top:60px;right:12px;z-index:20;font-size:9px;color:#0f8;background:rgba(0,0,0,0.7);padding:5px 9px;border-radius:8px;font-family:monospace;text-align:right;';
    document.body.appendChild(debugEl);

    function updateStateBadge() {
        if (isThrowing || flying) {
            stateBadge.textContent = '🪙 飞行中…';
            stateBadge.className = 'state-badge flying';
        } else if (motion.state === 'ready') {
            stateBadge.textContent = '✅ 可以投掷';
            stateBadge.className = 'state-badge ready';
        } else {
            stateBadge.textContent = '🤳 稳住手机…';
            stateBadge.className = 'state-badge wait';
        }
    }

    // Pulls a magnitude + a lateral-aim value out of whichever sensor signal
    // we lock onto. rotationRate (gyroscope) is tried first: a throwing
    // flick is fundamentally a rotation of the wrist, so it reliably
    // produces a huge spike (tens to hundreds of deg/s) on virtually any
    // device. accelerationIncludingGravity, by contrast, is often produced
    // by a heavily low-pass "gravity" virtual sensor that's built to ignore
    // fast transient motion - which is why it barely moved even at full
    // force. acceleration (gravity-free) is a middle-ground fallback.
    function readSignal(e) {
        if (motion.source === null) {
            if (e.rotationRate && (e.rotationRate.alpha !== null || e.rotationRate.beta !== null || e.rotationRate.gamma !== null)) {
                motion.source = 'rotation';
            } else if (e.acceleration && e.acceleration.x !== null) {
                motion.source = 'linear';
            } else if (e.accelerationIncludingGravity && e.accelerationIncludingGravity.x !== null) {
                motion.source = 'gravity';
            } else {
                return null;
            }
            // Real sensor data confirmed - no need to fall back to touch.
            if (motion.autoStartTimeout) { clearTimeout(motion.autoStartTimeout); motion.autoStartTimeout = null; }
        }
        if (motion.source === 'rotation') {
            const r = e.rotationRate;
            if (!r || r.alpha === null) return null;
            return {
                mag: Math.sqrt((r.alpha || 0) ** 2 + (r.beta || 0) ** 2 + (r.gamma || 0) ** 2),
                aim: r.gamma || 0
            };
        }
        const a = motion.source === 'linear' ? e.acceleration : e.accelerationIncludingGravity;
        if (!a || a.x === null) return null;
        return {
            mag: Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2),
            aim: a.x || 0
        };
    }

    // Hard absolute floors, in each sensor's native units, below which a
    // spike is NEVER treated as a throw - no matter how quiet the resting
    // noise floor is. This is what actually distinguishes a fast intentional
    // flick from an accidental slow tilt: a flick blows way past these
    // numbers; a tilt doesn't get close.
    //   rotation: deg/s from the gyroscope - a real flick is typically
    //             200-500+ deg/s; casual tilting is well under 100.
    //   linear:   m/s^2 gravity-free acceleration - a flick is roughly
    //             8-15+; hand tremor/tilt is a couple at most.
    //   gravity:  m/s^2 delta on the gravity-fused channel - this one is
    //             inherently low-sensitivity, kept as a last-resort fallback.
    const SOURCE_FLOOR = { rotation: 200, linear: 8, gravity: 3.5 };

    // The resting/steady value for each sensor type is a known physical
    // constant, NOT something that needs to drift over time:
    //   rotation: gyroscope reads ~0 deg/s at rest, at ANY orientation.
    //   linear:   gravity-free accelerometer reads ~0 at rest, at any angle.
    //   gravity:  the gravity vector's magnitude is ~9.8 regardless of angle.
    // Earlier this baseline was a moving average that got updated whenever
    // motion "looked steady" - but the follow-through right after a flick
    // (hand still settling) could get misclassified as steady and blend
    // into that average, dragging the baseline away from truth. Repeat that
    // over a few throws and the threshold balloons until nothing clears it,
    // even though the sensor itself is working fine. Pinning the mean to
    // the known constant removes the drift entirely; only the noise-floor
    // (variance) still gets calibrated from real samples.
    const BASE_MEAN = { rotation: 0, linear: 0, gravity: 9.8 };

    function handleMotion(e) {
        const now = performance.now();
        const dt = now - motion.lastEventTime;
        motion.lastEventTime = now;

        const sig = readSignal(e);
        if (!sig) return;
        const mag = sig.mag;
        const baseMean = BASE_MEAN[motion.source] ?? 0;

        const stdDev = Math.sqrt(Math.max(motion.variance, 0.0001));
        const delta = mag - baseMean;
        const floor = SOURCE_FLOOR[motion.source] || 6;
        const threshold = Math.max(stdDev * 8, floor);

        if (motion.debug) {
            debugEl.textContent = `[${motion.source}] mag:${mag.toFixed(1)} base:${baseMean.toFixed(1)} σ:${stdDev.toFixed(2)} Δ:${delta.toFixed(1)} thr:${threshold.toFixed(1)} st:${motion.state}`;
        }

        if (isThrowing || flying) return; // ignore motion while a coin is in the air

        if (motion.state === 'wait' || motion.state === 'cooldown') {
            // Only the noise floor (variance) gets calibrated here - the
            // mean itself stays pinned to the known constant above, so it
            // can never drift no matter what the hand does during cooldown.
            const dev = mag - baseMean;
            const looksSteady = Math.abs(dev) < Math.max(stdDev * 6, floor * 0.6);
            if (looksSteady) {
                const cappedVariance = Math.min(motion.variance, (floor * 0.5) ** 2); // don't let noise floor runaway
                motion.variance = cappedVariance * 0.92 + (dev * dev) * 0.08;
                motion.steadyStreak += dt;
                if (motion.steadyStreak > 500) {
                    motion.state = 'ready';
                    updateStateBadge();
                }
            } else {
                motion.steadyStreak = 0;
            }
        } else if (motion.state === 'ready') {
            if (delta > threshold) {
                // Require the spike to be confirmed on the very next sample
                // too (a real flick spans several samples at 60Hz; a single
                // stray glitch sample won't repeat).
                if (!motion.pendingSince) {
                    motion.pendingSince = now;
                    motion.pendingPeak = delta;
                    return;
                }
                motion.pendingPeak = Math.max(motion.pendingPeak, delta);
                if (now - motion.pendingSince < 40) return; // wait for confirmation sample

                const confirmedDelta = motion.pendingPeak;
                motion.pendingSince = null;
                motion.pendingPeak = 0;

                if (!motion.maxSeen || confirmedDelta > motion.maxSeen) motion.maxSeen = confirmedDelta;
                const power = Math.max(15, Math.min(100, (confirmedDelta / motion.maxSeen) * 100));
                const aimVX = Math.max(-6, Math.min(6, sig.aim * (motion.source === 'rotation' ? 0.06 : 0.9)));
                motion.state = 'cooldown';
                motion.steadyStreak = 0;
                performThrow(power, aimVX);
            } else {
                motion.pendingSince = null;
                motion.pendingPeak = 0;
            }
        }
    }

    function startMotion() {
        motion.supported = true;
        motion.active = true;
        window.addEventListener('devicemotion', handleMotion, true);
        motion.state = 'wait';
        updateStateBadge();
    }

    // ============================================================
    //  Fallback: touch / mouse swipe (desktop or permission denied)
    // ============================================================
    let touchActive = false;
    let touchStartY = 0;

    function fallbackToTouch() {
        motion.supported = false;
        document.getElementById('hint').textContent = '👆 向上滑动投掷 · 松手即甩出';
        motion.state = 'ready';
        updateStateBadge();
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', onTouchEnd, { passive: false });
        canvas.addEventListener('mousedown', e => onTouchStart({ preventDefault(){}, touches: [{ clientY: e.clientY }] }));
        canvas.addEventListener('mousemove', e => { if (touchActive) onTouchMove({ preventDefault(){}, touches: [{ clientY: e.clientY }] }); });
        window.addEventListener('mouseup', () => { if (touchActive) onTouchEnd({ preventDefault(){} }); });
    }
    function onTouchStart(e) {
        e.preventDefault();
        if (isThrowing || flying) return;
        touchActive = true;
        touchStartY = e.touches[0].clientY;
        powerValue = 0;
    }
    function onTouchMove(e) {
        e.preventDefault();
        if (!touchActive || isThrowing || flying) return;
        const dy = touchStartY - e.touches[0].clientY;
        powerValue = Math.max(0, Math.min(100, dy * 0.5));
    }
    function onTouchEnd(e) {
        e.preventDefault();
        if (!touchActive) return;
        touchActive = false;
        if (isThrowing || flying) return;
        if (powerValue > 8) {
            performThrow(powerValue, 0);
        } else {
            powerValue = 0;
        }
    }

    // ============================================================
    //  Clean desk (only enabled once everything has settled)
    // ============================================================
    function isCleanReady() {
        if (isThrowing || flying) return false;
        if (coins.length === 0) return false;
        return coins.every(c => Date.now() - c.landedAt > 400);
    }
    function updateCleanButton() {
        cleanBtn.classList.toggle('disabled', !isCleanReady());
    }
    function cleanDesk() {
        if (!isCleanReady()) return;
        coins.forEach(c => emitParticles(c.x, c.y, 18, '#888', 4, 28));
        coins = [];
        comboCount = 0;
        comboEl.className = 'combo';
        updateCleanButton();
    }
    window.cleanDesk = cleanDesk;

    // ============================================================
    //  Main loop
    // ============================================================
    function frame() {
        drawTable();
        drawTarget();

        coins.forEach(c => drawCoin(c.x, c.y, 0.82, 0));

        if (flying) {
            updateFlying();
        } else if (!isThrowing) {
            const glow = Math.min(powerValue / 100, 1.2);
            drawCoin(coinStartX, coinStartY, 1 + powerValue / 500, glow);
            if (powerValue > 10) {
                ctx.beginPath();
                ctx.arc(coinStartX, coinStartY, 26 + powerValue / 5, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,215,0,${0.1 + powerValue / 300})`;
                ctx.lineWidth = 2 + powerValue / 40;
                ctx.setLineDash([6, 10]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            document.getElementById('power').textContent = Math.floor(powerValue);
        }

        updateAndDrawParticles();
        updateAndDrawPopups();
        updateCleanButton();

        requestAnimationFrame(frame);
    }

    // ============================================================
    //  Init
    // ============================================================
    function init() {
        layout();
        computeRings();
        window.addEventListener('resize', () => { layout(); computeRings(); });
        frame();
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        document.getElementById('startOverlay').style.display = 'none';
        try {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const state = await DeviceMotionEvent.requestPermission();
                if (state === 'granted') startMotion(); else fallbackToTouch();
            } else if (window.DeviceMotionEvent) {
                startMotion();
            } else {
                fallbackToTouch();
            }
        } catch (err) {
            fallbackToTouch();
        }
    });

    // On load: only iOS 13+ Safari genuinely needs a user tap before it will
    // release sensor data (DeviceMotionEvent.requestPermission existing is
    // the tell). Everywhere else - Android Firefox/Chrome, desktop browsers
    // with sensors - just start listening immediately, no overlay needed.
    // If no real sensor numbers show up within a short window (denied,
    // unsupported, or a desktop with no sensors at all), fall back to touch
    // controls automatically instead of leaving the player stuck.
    function autoDetectAndStart() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            document.getElementById('startOverlay').style.display = 'flex';
            return;
        }
        if (window.DeviceMotionEvent) {
            startMotion();
            motion.autoStartTimeout = setTimeout(() => {
                if (motion.source === null) {
                    window.removeEventListener('devicemotion', handleMotion, true);
                    fallbackToTouch();
                }
            }, 1200);
        } else {
            fallbackToTouch();
        }
    }

    init();
    autoDetectAndStart();
</script>
</body>
</html>
