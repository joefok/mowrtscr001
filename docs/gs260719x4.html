<!DOCTYPE html>
<html lang="zh-yue-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌈 掟彩虹 · 揈手速擲</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; touch-action:none; -webkit-tap-highlight-color: transparent; }
    body {
        height: 100vh; width: 100vw; overflow: hidden;
        background: #0a001f; font-family: 'Press Start 2P', cursive;
        color: #fff;
    }
    canvas { display: block; }
    .hud {
        position: absolute; top: 12px; left: 12px; z-index: 20;
        background: rgba(0,0,0,0.8); padding: 10px 14px; border-radius: 8px;
        font-size: 11px; line-height: 1.6;
        border: 1px solid rgba(255,215,0,0.2);
        pointer-events: none;
    }
    .hud .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .hud .score { color: #ffd700; }
    .hud .power-wrap { display: flex; justify-content: space-between; margin-top: 2px; }

    .status-bar {
        position: absolute; top: 0; left: 0; right: 0; z-index: 25; height: 6px;
        transition: all 0.3s ease;
    }
    .status-bar.ready {
        background: linear-gradient(90deg, #00ff66, #33ff99, #00ff66);
        box-shadow: 0 0 20px rgba(0,255,102,0.6), 0 0 40px rgba(0,255,102,0.3);
        animation: pulse-green 1.2s ease-in-out infinite;
    }
    .status-bar.wait {
        background: linear-gradient(90deg, #ff66aa, #ff88cc, #ff66aa);
        box-shadow: 0 0 20px rgba(255,102,170,0.6), 0 0 40px rgba(255,102,170,0.3);
        animation: pulse-pink 1.5s ease-in-out infinite;
    }
    .status-bar.flying {
        background: linear-gradient(90deg, #ffdd44, #ffee66, #ffdd44);
        box-shadow: 0 0 20px rgba(255,221,68,0.6), 0 0 40px rgba(255,221,68,0.3);
    }
    @keyframes pulse-green { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes pulse-pink { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } }

    .status-border {
        position: absolute; inset: 0; z-index: 18; pointer-events: none;
        border: 4px solid transparent; transition: all 0.4s ease;
    }
    .status-border.ready {
        border-color: rgba(0,255,102,0.5);
        box-shadow: inset 0 0 30px rgba(0,255,102,0.15), inset 0 0 60px rgba(0,255,102,0.05);
    }
    .status-border.wait {
        border-color: rgba(255,102,170,0.4);
        box-shadow: inset 0 0 30px rgba(255,102,170,0.1), inset 0 0 60px rgba(255,102,170,0.03);
    }
    .status-border.flying {
        border-color: rgba(255,221,68,0.5);
        box-shadow: inset 0 0 30px rgba(255,221,68,0.15), inset 0 0 60px rgba(255,221,68,0.05);
    }

    .corner-status {
        position: absolute; top: 18px; right: 68px; z-index: 22;
        font-size: 9px; padding: 6px 10px; border-radius: 4px;
        background: rgba(0,0,0,0.7); transition: all 0.3s; pointer-events: none;
    }
    .corner-status.ready { color: #00ff66; border: 1px solid rgba(0,255,102,0.4); }
    .corner-status.wait { color: #ff88aa; border: 1px solid rgba(255,102,170,0.3); }
    .corner-status.flying { color: #ffdd44; border: 1px solid rgba(255,221,68,0.4); }

    /* Phone-dummy: replaces the old raw sensor-number readout. Tilts live
       to mirror the phone's real orientation, colored by the same
       wait/ready/flying states as the rest of the HUD. */
    .phone-dummy-wrap {
        position: absolute; top: 14px; right: 14px; z-index: 23;
        width: 44px; height: 60px; perspective: 240px; pointer-events: none;
    }
    .phone-dummy {
        width: 24px; height: 46px; margin: 7px auto 0;
        background: #14141c; border: 2px solid rgba(255,102,170,0.55);
        border-radius: 6px; position: relative;
        transform-style: preserve-3d;
        transition: border-color 0.3s, box-shadow 0.3s;
        box-shadow: 0 0 12px rgba(255,102,170,0.35);
    }
    .phone-dummy::before {
        content: ''; position: absolute; inset: 4px 3px;
        background: rgba(255,255,255,0.08); border-radius: 3px;
    }
    .phone-dummy.ready { border-color: #00ff66; box-shadow: 0 0 14px rgba(0,255,102,0.5); }
    .phone-dummy.wait { border-color: #ff66aa; box-shadow: 0 0 14px rgba(255,102,170,0.4); }
    .phone-dummy.flying { border-color: #ffdd44; box-shadow: 0 0 14px rgba(255,221,68,0.5); }

    .combo {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
        z-index: 15; font-size: 34px; color: #ffdd44;
        text-shadow: 0 0 40px rgba(255,220,0,0.6);
        pointer-events: none; opacity: 0; transition: opacity 0.2s;
    }
    .combo.show { opacity: 1; animation: pop 0.5s ease-out; }
    @keyframes pop {
        0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
        50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
        100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    }
    .hint {
        position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
        z-index: 12; font-size: 10px; color: rgba(255,215,0,0.6);
        background: rgba(0,0,0,0.45); padding: 6px 16px;
        border-radius: 20px; backdrop-filter: blur(2px);
        border: 1px solid rgba(255,215,0,0.1);
        white-space: nowrap; text-align: center;
        animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

    .overlay {
        position: absolute; inset: 0; z-index: 50;
        background: radial-gradient(circle at 50% 40%, #1a0838, #04000f);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; text-align: center; padding: 24px;
    }
    .overlay h1 { font-size: 16px; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); line-height: 1.6; }
    .overlay p { font-size: 10px; color: rgba(255,255,255,0.75); line-height: 1.8; max-width: 320px; }
    .overlay button {
        background: linear-gradient(135deg, #ffd700, #ff9900);
        border: none; color: #1a0e00; padding: 14px 26px;
        font-family: 'Press Start 2P', cursive; font-size: 11px;
        border-radius: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(255,180,0,0.4);
    }
    .overlay button:active { transform: scale(0.96); }
    .overlay .sub { font-size: 9px; color: rgba(255,255,255,0.4); }

    .event-banner {
        position: absolute; top: 56px; left: 50%;
        transform: translateX(-50%) translateY(-10px);
        z-index: 21; font-size: 10px; color: #ffe066;
        text-shadow: 0 0 16px rgba(255,220,0,0.5);
        pointer-events: none; opacity: 0;
        background: rgba(0,0,0,0.7); padding: 8px 16px;
        border-radius: 20px; border: 1px solid rgba(255,215,0,0.35);
        white-space: nowrap;
        transition: opacity 0.3s, transform 0.3s;
    }
    .event-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .boss-banner {
        position: absolute; top: 26%; left: 50%; transform: translate(-50%,-50%) scale(0.6);
        z-index: 40; font-size: 15px; color: #ff4444;
        text-shadow: 0 0 40px rgba(255,68,68,0.8);
        pointer-events: none; opacity: 0;
        background: rgba(0,0,0,0.8); padding: 14px 26px;
        border-radius: 16px; border: 3px solid rgba(255,68,68,0.5);
        white-space: nowrap;
    }
    .boss-banner.show { opacity: 1; animation: bossAppear 2s ease-out; }
    @keyframes bossAppear {
        0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
        20% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
        80% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
        100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
    }

    @media (max-width:500px) {
        .hud { font-size: 9px; padding: 6px 10px; }
        .hud .row { gap: 6px; }
        .corner-status { font-size: 8px; padding: 4px 8px; top: 14px; right: 60px; }
        .phone-dummy-wrap { top: 10px; right: 10px; width: 38px; height: 52px; }
        .phone-dummy { width: 20px; height: 38px; }
        .combo { font-size: 24px; }
        .hint { font-size: 9px; bottom: 18px; white-space: normal; }
        .overlay h1 { font-size: 13px; }
        .event-banner { font-size: 9px; padding: 6px 12px; top: 50px; }
        .boss-banner { font-size: 12px; padding: 10px 18px; }
    }
    /* Classic Windows 3.1 "stop" style dialog - shown when the motion
       sensor genuinely isn't sending usable data. Positioned near the
       bottom throw area, not a full-screen blocker. */
    .win31-dialog {
        position: absolute; left: 50%; bottom: 15%; transform: translateX(-50%);
        z-index: 60; width: min(300px, 84vw);
        background: #c0c0c0; border: 2px solid #fff;
        box-shadow: 3px 3px 0 rgba(0,0,0,0.5), inset -1px -1px 0 #808080, inset 1px 1px 0 #dfdfdf;
        font-family: "MS Sans Serif", Tahoma, Geneva, sans-serif;
        color: #000; display: none;
    }
    .win31-dialog.show { display: block; }
    .win31-titlebar {
        background: linear-gradient(90deg, #000080, #1084d0);
        color: #fff; font-size: 12px; font-weight: bold;
        padding: 3px 6px; display: flex; justify-content: space-between; align-items: center;
    }
    .win31-titlebar .closebtn {
        background: #c0c0c0; border: 1px solid #000; width: 15px; height: 13px;
        font-size: 9px; line-height: 11px; text-align: center; cursor: pointer;
        box-shadow: inset -1px -1px 0 #808080, inset 1px 1px 0 #fff;
    }
    .win31-body { padding: 12px 12px 6px; display: flex; gap: 10px; align-items: flex-start; }
    .win31-icon { font-size: 26px; flex-shrink: 0; }
    .win31-msg { font-size: 11px; line-height: 1.6; padding-top: 2px; }
    .win31-footer { padding: 8px 12px 12px; text-align: center; }
    .win31-ok {
        background: #c0c0c0; border: 1px solid #000; padding: 4px 22px; font-size: 11px;
        box-shadow: inset -1px -1px 0 #808080, inset 1px 1px 0 #fff;
        cursor: pointer; font-family: inherit;
    }
    .win31-ok:active { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #fff; }
    /* Attract-mode label: semi-transparent 8-bit text shown while the
       demo loop is auto-throwing. Disappears with a chunky, stepped
       "glitch" animation (not a smooth fade) the instant a real throw
       is detected and demo mode ends. */
    .attract-label {
        position: absolute; top: 64%; left: 50%; transform: translate(-50%, -50%);
        z-index: 30; font-size: 15px; color: #ffdd44; letter-spacing: 3px;
        text-shadow: 2px 2px 0 rgba(0,0,0,0.6), 0 0 12px rgba(255,221,68,0.4);
        pointer-events: none; display: none; opacity: 0;
    }
    .attract-label.show { display: block; opacity: 0.55; animation: attractFlicker 1s steps(2) infinite; }
    .attract-label.hide { display: block; animation: attractGlitchOut 0.55s steps(7) forwards; }
    @keyframes attractFlicker { 0%, 100% { opacity: 0.55; } 50% { opacity: 0.38; } }
    @keyframes attractGlitchOut {
        0%   { opacity: 1;   transform: translate(-50%, -50%) scale(1);              clip-path: inset(0 0 0 0); }
        14%  { opacity: 0.85; transform: translate(calc(-50% + 4px), -50%) scale(1);  clip-path: inset(0 0 45% 0); }
        28%  { opacity: 0.75; transform: translate(calc(-50% - 4px), -50%) scale(1);  clip-path: inset(30% 0 0 0); }
        42%  { opacity: 0.6;  transform: translate(-50%, -50%) scale(1.06);           clip-path: inset(0 40% 0 0); }
        57%  { opacity: 0.45; transform: translate(calc(-50% + 3px), -50%) scale(1);  clip-path: inset(0 0 60% 0); }
        71%  { opacity: 0.3;  transform: translate(-50%, -50%) scale(0.94);           clip-path: inset(50% 0 0 0); }
        85%  { opacity: 0.15; transform: translate(-50%, -50%) scale(0.9);            clip-path: inset(0 0 85% 0); }
        100% { opacity: 0;    transform: translate(-50%, -50%) scale(0.85);           clip-path: inset(100% 0 0 0); }
    }
</style>
</head>
<body>

<div class="overlay" id="startOverlay" style="display:none;">
    <h1>🌈 掟彩虹<br>揈手速擲</h1>
    <p>將手機當成真硬幣咁揈：<br>揸穩手機，向前快速一揈，<br>硬幣就會喺枱面滑向遠處嘅彩虹靶。<br>力度太細會滑唔到，太大力會衝過龍門彈返嚟。</p>
    <button id="startBtn">📳 開始 · 授權動作感應</button>
    <div class="sub" id="startSub">要開咗動作感應先揈得到</div>
</div>

<div class="status-bar wait" id="statusBar"></div>
<div class="status-border wait" id="statusBorder"></div>
<div class="corner-status wait" id="cornerStatus">🤳 揸穩</div>
<div class="phone-dummy-wrap"><div class="phone-dummy wait" id="phoneDummy"></div></div>

<div class="hud" id="hud">
    <div class="row">
        <span>🔴 <span id="red" class="score">0</span></span>
        <span>🟢 <span id="green" class="score">0</span></span>
        <span>🟡 <span id="yellow" class="score">0</span></span>
        <span>🟣 <span id="purple" class="score">0</span></span>
    </div>
    <div class="power-wrap">
        <span>⚡ <span id="power">0</span></span>
        <span>💰 <span id="totalScore">0</span></span>
    </div>
</div>

<div class="combo" id="comboDisplay"></div>
<div class="event-banner" id="eventBanner"></div>
<div class="boss-banner" id="bossBanner"></div>
<div class="hint" id="hint">🤳 揸穩手機兩秒 → 快速向前一揈</div>

<div class="win31-dialog" id="win31Dialog">
    <div class="win31-titlebar"><span>⚠ 系統訊息</span><span class="closebtn" id="win31Close">✕</span></div>
    <div class="win31-body">
        <div class="win31-icon">🛑</div>
        <div class="win31-msg" id="win31Msg"></div>
    </div>
    <div class="win31-footer"><button class="win31-ok" id="win31Ok">確定</button></div>
</div>

<div class="attract-label" id="attractLabel">自動掛機中</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let coinStartX, coinStartY;
    let target = { x: 0, y: 0, vx: 0 };

    function layout() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
        coinStartX = W * 0.5;
        coinStartY = H * 0.90;
        target.y = H * 0.22;
        if (target.x === 0) target.x = W * 0.5;
    }

    function detectLocale() {
        const langs = navigator.languages || [navigator.language || 'en'];
        for (const raw of langs) {
            const lc = (raw || '').toLowerCase();
            if (!lc) continue;
            if (lc.startsWith('zh')) {
                if (lc.includes('hk') || lc.includes('yue') || lc.includes('hant') || lc.includes('tw') || lc.includes('mo')) return 'zh-HK';
                return 'zh-CN';
            }
            if (lc.startsWith('ja')) return 'ja';
            if (lc.startsWith('ko')) return 'ko';
            if (lc.startsWith('es')) return 'es';
            if (lc.startsWith('pt')) return 'pt';
            if (lc.startsWith('fr')) return 'fr';
            if (lc.startsWith('de')) return 'de';
            if (lc.startsWith('ru')) return 'ru';
            if (lc.startsWith('en')) return 'en';
        }
        return 'en';
    }

    // ============================================================
    //  Procedural audio - fires ONLY from the coin-landed event now.
    //  The previous version also ran a setInterval-driven background
    //  loop; that's exactly the kind of thing Firefox's autoplay /
    //  tab-engagement throttling can silently kill after a while,
    //  which is very likely why it worked in preview but not in
    //  Firefox. Removing it and keeping every sound tied to a single,
    //  direct user-caused event (the coin landing) is both what was
    //  asked for and the fix for that.
    // ============================================================
    let audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx) {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            catch (e) { return null; }
        }
        return audioCtx;
    }
    // FIX for intermittent playback: the old code called ctxA.resume()
    // and then scheduled sound immediately without waiting for it -
    // resume() is async, so on some browsers/timings the context was
    // still 'suspended' at the moment osc.start() ran and the sound was
    // silently dropped. This waits for 'running' before scheduling.
    function withAudio(fn) {
        const ctxA = getAudioCtx();
        if (!ctxA) return;
        if (ctxA.state === 'running') { fn(ctxA); return; }
        ctxA.resume().then(() => { if (ctxA.state === 'running') fn(ctxA); }).catch(() => {});
    }
    // Also recover from the context getting suspended again later (e.g.
    // after the tab/app loses and regains focus, common on mobile).
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume().catch(() => {});
        }
    });
    function playTone(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
        withAudio((ctxA) => {
            const t0 = ctxA.currentTime + delay;
            const osc = ctxA.createOscillator();
            const gain = ctxA.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, t0);
            gain.gain.setValueAtTime(0, t0);
            gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
            osc.connect(gain);
            gain.connect(ctxA.destination);
            osc.start(t0);
            osc.stop(t0 + dur + 0.02);
        });
    }
    function playNoiseBurst(dur = 0.2, vol = 0.2) {
        withAudio((ctxA) => {
            const bufferSize = Math.floor(ctxA.sampleRate * dur);
            const buffer = ctxA.createBuffer(1, bufferSize, ctxA.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctxA.createBufferSource();
            src.buffer = buffer;
            const gain = ctxA.createGain();
            gain.gain.value = vol;
            src.connect(gain);
            gain.connect(ctxA.destination);
            src.start();
        });

    let stars = [];
    const STAR_COUNT = 120;
    let decoItems = [];
    const DECO_COUNT = 10;
    let scanlineOffset = 0;
    let bgTime = 0;

    function initStars() {
        stars = [];
        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random() * W, y: Math.random() * H * 0.50,
                size: Math.random() < 0.7 ? 1 : 2, brightness: Math.random(),
                twinkleSpeed: 0.02 + Math.random() * 0.04, phase: Math.random() * Math.PI * 2
            });
        }
    }
    function initDeco() {
        decoItems = [];
        for (let i = 0; i < DECO_COUNT; i++) {
            decoItems.push({
                x: Math.random() * W, y: H * 0.08 + Math.random() * H * 0.32,
                type: Math.random() < 0.5 ? 'star' : 'diamond',
                color: ['#ff00ff', '#00ffff', '#ffff00', '#ff6600', '#ff3366'][Math.floor(Math.random() * 5)],
                size: 5 + Math.random() * 7, speed: 0.2 + Math.random() * 0.5, phase: Math.random() * Math.PI * 2
            });
        }
    }
    function drawStars() {
        for (let s of stars) {
            const alpha = 0.3 + 0.7 * Math.abs(Math.sin(bgTime * s.twinkleSpeed + s.phase));
            ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
            ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
        }
    }
    function drawPixelMountains() {
        const mountainY = H * 0.42;
        const mountainColors = ['#0d0520', '#140830', '#1a0d3a', '#0f0825'];
        for (let layer = 0; layer < 4; layer++) {
            const layerY = mountainY - layer * 18;
            const baseHeight = 35 + layer * 22;
            const pixelSize = 4 + layer * 2;
            ctx.fillStyle = mountainColors[layer];
            for (let x = 0; x < W + pixelSize; x += pixelSize) {
                const noise = Math.sin(x * 0.003 + layer * 2.5) * 0.5 + Math.sin(x * 0.007 + layer * 1.3) * 0.3 + Math.sin(x * 0.015) * 0.2;
                const height = baseHeight + noise * (28 + layer * 12);
                const h = Math.max(0, height);
                ctx.fillRect(x, layerY - h, pixelSize, h + 60);
            }
        }
    }
    function drawNeonGrid() {
        const gridTop = H * 0.45;
        const gridBottom = H;
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.12)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 14; i++) {
            const t = i / 14;
            const y = gridTop + (gridBottom - gridTop) * (t * t);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
        const centerX = W / 2;
        const vanishY = H * 0.30;
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.10)';
        for (let i = -10; i <= 10; i++) {
            const angle = i * 0.065;
            const x1 = centerX + Math.tan(angle) * (gridTop - vanishY);
            const x2 = centerX + Math.tan(angle) * (H - vanishY);
            ctx.beginPath(); ctx.moveTo(x1, gridTop); ctx.lineTo(x2, H); ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(255, 100, 200, 0.25)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, H - 2); ctx.lineTo(W, H - 2); ctx.stroke();
    }
    function drawScanlines() {
        scanlineOffset = (scanlineOffset + 0.5) % 4;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
        for (let y = scanlineOffset; y < H; y += 4) ctx.fillRect(0, Math.floor(y), W, 1);
    }
    function drawRetroTint() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, 'rgba(10, 0, 40, 0.25)');
        grad.addColorStop(0.5, 'rgba(0, 0, 0, 0)');
        grad.addColorStop(1, 'rgba(40, 0, 20, 0.15)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
    }
    function drawDecoItems() {
        for (let d of decoItems) {
            const floatY = d.y + Math.sin(bgTime * 0.001 + d.phase) * 8;
            const alpha = 0.35 + 0.3 * Math.sin(bgTime * 0.002 + d.phase);
            ctx.fillStyle = d.color;
            ctx.globalAlpha = alpha;
            if (d.type === 'star') {
                const s = d.size;
                ctx.fillRect(Math.floor(d.x - s/2), Math.floor(floatY - s/6), s, Math.max(1, s/3));
                ctx.fillRect(Math.floor(d.x - s/6), Math.floor(floatY - s/2), Math.max(1, s/3), s);
            } else {
                const s = d.size;
                ctx.fillRect(Math.floor(d.x - s/2), Math.floor(floatY), s, 2);
                ctx.fillRect(Math.floor(d.x), Math.floor(floatY - s/2), 2, s);
            }
            ctx.globalAlpha = 1;
        }
    }

    let coins = [];
    let scores = { red: 0, green: 0, yellow: 0, purple: 0 };
    let totalScore = 0;
    let powerValue = 0;
    let isThrowing = false;
    let comboCount = 0;
    let lastHitTime = 0;
    let totalThrows = 0;

    const RING_DEFS = [
        { label: 'red',    pts: 1, color: '#ff2244', frac: 0.34 },
        { label: 'green',  pts: 2, color: '#33ff77', frac: 0.25 },
        { label: 'yellow', pts: 3, color: '#ffdd33', frac: 0.165 },
        { label: 'purple', pts: 5, color: '#aa44ff', frac: 0.095 }
    ];
    let RINGS = [];
    function computeRings() {
        const base = Math.min(W, H);
        RINGS = RING_DEFS.map(r => ({ ...r, radius: base * r.frac }));
    }

    const PERSPECTIVE_SQUASH = 0.55;
    const COIN_DRAW_RADIUS = 18;
    const COIN_LANDED_SCALE = 0.82;

    function getDeskBoundsAtY(y) {
        const deskTop = H * 0.10;
        const topHalf = W * 0.28;
        const botHalf = W * 0.62;
        const t = (y - deskTop) / (H - deskTop);
        const half = topHalf + (botHalf - topHalf) * t;
        return { left: W/2 - half, right: W/2 + half };
    }

    let targetMovePhase = 0;
    let targetMoveSpeed = 0.0015;
    let targetMoveRange = 0.15;

    function updateTargetPosition() {
        targetMovePhase += targetMoveSpeed * 16;
        const offset = Math.sin(targetMovePhase) * W * targetMoveRange;
        let x = W * 0.5 + offset;
        const bounds = getDeskBoundsAtY(target.y);
        const outerR = (RINGS.length ? RINGS[0].radius : W * 0.1) * targetScale;
        const margin = outerR + 10;
        x = Math.max(bounds.left + margin, Math.min(bounds.right - margin, x));
        target.x = x;
    }

    let isGoldenCoin = false;
    let goldenCoinTimer = 0;
    const GOLDEN_CHANCE = 0.08;

    function checkGoldenCoin() {
        isGoldenCoin = Math.random() < GOLDEN_CHANCE;
        goldenCoinTimer = isGoldenCoin ? 120 : 0;
    }

    let cameraShake = { x: 0, y: 0, intensity: 0 };
    let slowMotion = 1.0;

    function triggerCameraShake(intensity) {
        cameraShake.intensity = intensity;
    }
    function updateCameraShake() {
        if (cameraShake.intensity > 0) {
            cameraShake.x = (Math.random() - 0.5) * cameraShake.intensity;
            cameraShake.y = (Math.random() - 0.5) * cameraShake.intensity;
            cameraShake.intensity *= 0.92;
            if (cameraShake.intensity < 0.5) cameraShake.intensity = 0;
        } else {
            cameraShake.x = 0;
            cameraShake.y = 0;
        }
    }

    const COMBO_MULTIPLIERS = [1, 1, 1.5, 2, 2.5, 3];
    function getComboMultiplier() {
        if (comboCount <= 1) return 1;
        return COMBO_MULTIPLIERS[Math.min(comboCount - 1, COMBO_MULTIPLIERS.length - 1)];
    }

    let isCriticalThrow = false;

    const EVENTS = [

        { get name() { return T.events.giant; }, duration: 12000, apply: () => { targetScale = 1.6; }, remove: () => { targetScale = 1.0; }, color: '#00ff66' },
        { get name() { return T.events.tiny; }, duration: 10000, apply: () => { targetScale = 0.6; }, remove: () => { targetScale = 1.0; }, color: '#ff3366' },
        { get name() { return T.events.wind; }, duration: 8000, apply: () => { windForce = (Math.random() < 0.5 ? -1 : 1) * 0.3; }, remove: () => { windForce = 0; }, color: '#66ccff' },
        { get name() { return T.events.ice; }, duration: 10000, apply: () => { frictionOverride = 0.985; }, remove: () => { frictionOverride = null; }, color: '#aaddff' },

    function checkEvents() {
        const now = Date.now();
        if (activeEvent) {
            if (now > eventTimer) {
                activeEvent.remove();
                activeEvent = null;
                nextEventTime = now + 20000 + Math.random() * 10000;
            }
        } else if (now > nextEventTime) {
            activeEvent = EVENTS[Math.floor(Math.random() * EVENTS.length)];
            activeEvent.apply();
            eventTimer = now + activeEvent.duration;
            showEventBanner(activeEvent.name, activeEvent.color);

    }

    let bossMode = null;
    let bossHealth = 0;
    let bossMaxHealth = 0;

    function getBossHitRadius() {
        return Math.min(W, H) * 0.135 * targetScale;
    }

    const BOSSES = [

                ctx.strokeStyle = '#ffd700';

                ctx.strokeRect(-40, -30, 80, 60);

                ctx.fillStyle = '#220000';

                ctx.ellipse(0, 0, 50, 35, 0, 0, Math.PI * 2);

                ctx.strokeStyle = '#ff3333';

                    ctx.strokeStyle = `hsl(${(time * 0.1 + i * 30) % 360}, 80%, 60%)`;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }
                ctx.fillStyle = '#000';

    // Called once at the end of landCoin() (a landing event) rather than
    // every animation frame - boss health and totalScore only ever change
    // there anyway, and this keeps every audio cue tied to that one event.
    function checkBossMode() {
        if (!bossMode && totalScore >= 50 && totalScore % 50 < 10) {
            bossMode = BOSSES[Math.floor(Math.random() * BOSSES.length)];
            bossHealth = 3;
            bossMaxHealth = 3;
            showBossBanner(bossMode.name + T.bossAppear);
            playBossSpawn();
        } else if (bossMode && bossHealth <= 0) {
            showBossBanner(bossMode.name + T.bossDefeat);
            playBossDefeat();
            bossMode = null;
            totalScore += 20;
            updateTotalScore();
        }
    }

    function showBossBanner(text) {
        bossBanner.textContent = text;
        bossBanner.className = 'boss-banner show';
        clearTimeout(bossBanner._timer);
        bossBanner._timer = setTimeout(() => { bossBanner.className = 'boss-banner'; }, 2000);
    }

    function updateStatusVisuals() {
        let stateClass = 'wait';
        let cornerText = T.statusWait;
        if (isThrowing || flying) { stateClass = 'flying'; cornerText = T.statusFlying; }
        else if (motion.state === 'ready') { stateClass = 'ready'; cornerText = T.statusReady; }
        statusBar.className = 'status-bar ' + stateClass;
        statusBorder.className = 'status-border ' + stateClass;
        cornerStatus.className = 'corner-status ' + stateClass;
        cornerStatus.textContent = cornerText;
        phoneDummyEl.className = 'phone-dummy ' + stateClass;
    }

    // Live phone-orientation dummy: derives tilt from the gravity vector
    // already present in every devicemotion event (no extra permission
    // needed beyond the one already granted for throw detection).
    function updatePhoneDummy(ax, ay, az) {
        if (ax === undefined || ax === null) return;
        const beta = Math.atan2(ay, az) * (180 / Math.PI);
        const gamma = Math.atan2(-ax, az) * (180 / Math.PI);
        const cb = Math.max(-75, Math.min(75, beta));
        const cg = Math.max(-75, Math.min(75, gamma));
        phoneDummyEl.style.transform = `rotateX(${cb}deg) rotateY(${cg}deg)`;
    }

    function drawTable() {
        ctx.fillStyle = '#0a001f';
        ctx.fillRect(0, 0, W, H);
        drawStars();
        drawPixelMountains();
        drawNeonGrid();
        drawDecoItems();

        const deskTop = H * 0.10;
        const topHalf = W * 0.28;
        const botHalf = W * 0.62;
        const grad = ctx.createLinearGradient(0, deskTop, 0, H);
        grad.addColorStop(0, 'rgba(36, 22, 8, 0.85)');
        grad.addColorStop(1, 'rgba(58, 40, 26, 0.85)');
        ctx.beginPath();
        ctx.moveTo(W / 2 - topHalf, deskTop);
        ctx.lineTo(W / 2 + topHalf, deskTop);
        ctx.lineTo(W / 2 + botHalf, H);
        ctx.lineTo(W / 2 - botHalf, H);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.15)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        for (let i = 1; i < 5; i++) {
            const t = i / 5;
            const y = deskTop + (H - deskTop) * t;
            const half = topHalf + (botHalf - topHalf) * t;
            ctx.beginPath();
            ctx.moveTo(W / 2 - half, y);
            ctx.lineTo(W / 2 + half, y);
            ctx.stroke();
        }

        const glow = ctx.createLinearGradient(0, deskTop, 0, H);
        glow.addColorStop(0, 'rgba(255,100,255,0.08)');
        glow.addColorStop(0.5, 'rgba(100,200,255,0.05)');
        glow.addColorStop(1, 'rgba(255,200,100,0.03)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, deskTop, W, H - deskTop);

        if (frictionOverride) {
            ctx.fillStyle = 'rgba(170, 220, 255, 0.1)';
            ctx.fillRect(0, deskTop, W, H - deskTop);
        }

        drawScanlines();
        drawRetroTint();
    }

    // ============================================================
    //  HK arcade-style rainbow skin - the flat, thick-outlined
    //  semicircle "dome" rainbow (red/yellow/green/blue bands) seen
    //  on classic Hong Kong game-center coin machines. Alternates in
    //  as one of the two target looks every time the desk auto-clears,
    //  purely cosmetic - same RINGS radii and scoring underneath, just
    //  a different paint job and silhouette.
    // ============================================================
    let targetTheme = 'classic';
    const HK_ARCADE_COLORS = ['#e8352f', '#f7ce23', '#3fa63f', '#2b4ea0']; // outer -> inner: red, yellow, green, blue

    function drawHkArcadeBand(outerR, innerR, color) {
        ctx.beginPath();
        ctx.arc(0, 0, outerR, Math.PI, Math.PI * 2, false);
        if (innerR > 0) {
            ctx.arc(0, 0, innerR, Math.PI * 2, Math.PI, true);
        } else {
            ctx.lineTo(0, 0);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.55)';
        ctx.lineWidth = 2.5;
        ctx.stroke();
    }

    function drawTarget() {
        ctx.save();
        ctx.translate(target.x, target.y);
        ctx.scale(1, PERSPECTIVE_SQUASH);
        const scale = targetScale;

        if (bossMode) {
            bossMode.draw(ctx, 0, 0, scale, bgTime);
            if (bossHealth > 0) {
                const barWidth = 80;
                const barHeight = 6;
                ctx.fillStyle = '#333';
                ctx.fillRect(-barWidth/2, -70, barWidth, barHeight);
                ctx.fillStyle = bossMode.color;
                ctx.fillRect(-barWidth/2, -70, barWidth * (bossHealth / bossMaxHealth), barHeight);
            }
        } else if (targetTheme === 'hkarcade') {
            // Same underlying RINGS radii (and therefore identical
            // scoring/hit-test) as the classic look - only the visual
            // shape and colors differ.
            for (let i = 0; i < RINGS.length; i++) {
                const outerR = RINGS[i].radius * scale;
                const innerR = (i + 1 < RINGS.length) ? RINGS[i + 1].radius * scale : 0;
                drawHkArcadeBand(outerR, innerR, HK_ARCADE_COLORS[i]);
            }
            // outer black rim for the classic arcade-plaque look
            ctx.beginPath();
            ctx.arc(0, 0, RINGS[0].radius * scale, Math.PI, Math.PI * 2, false);
            ctx.lineTo(-RINGS[0].radius * scale, 0);
            ctx.closePath();
            ctx.strokeStyle = 'rgba(0,0,0,0.7)';
            ctx.lineWidth = 3;
            ctx.stroke();
        } else {
            for (let i = 0; i < RINGS.length; i++) {
                const r = RINGS[i];
                ctx.beginPath();
                ctx.arc(0, 0, r.radius * scale + 6, 0, Math.PI * 2);
                ctx.fillStyle = r.color + '10';
                ctx.fill();
            }
            for (let i = 0; i < RINGS.length; i++) {
                ctx.beginPath();
                ctx.arc(0, 0, RINGS[i].radius * scale, 0, Math.PI * 2);
                ctx.fillStyle = RINGS[i].color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(0, 0, RINGS[RINGS.length - 1].radius * scale * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, RINGS[0].radius * scale + 18, 0, Math.PI * 2);
            const targetGlow = ctx.createRadialGradient(0, 0, RINGS[RINGS.length-1].radius * scale,
                                                         0, 0, RINGS[0].radius * scale + 18);
            targetGlow.addColorStop(0, 'rgba(170,68,255,0.08)');
            targetGlow.addColorStop(0.5, 'rgba(255,255,255,0.04)');
            targetGlow.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = targetGlow;
            ctx.fill();
        }
        ctx.restore();
    }

    function getPerspectiveScale(y) {
        const nearY = coinStartY;
        const farY = target.y;
        const t = Math.max(0, Math.min(1, (nearY - y) / (nearY - farY)));
        return 1.0 - t * 0.42;
    }
    function getCoinCollisionRadius(y) {
        return COIN_DRAW_RADIUS * COIN_LANDED_SCALE * getPerspectiveScale(y);
    }
    function clampToDesk(x, y) {
        const bounds = getDeskBoundsAtY(y);
        return {
            x: Math.max(bounds.left + 8, Math.min(bounds.right - 8, x)),
            y: Math.max(H * 0.10, Math.min(H - 5, y))
        };
    }

    function drawCoin(x, y, scale = 1, glow = 0) {
        const perspectiveScale = getPerspectiveScale(y);
        const finalScale = scale * perspectiveScale;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(finalScale, finalScale * PERSPECTIVE_SQUASH);

        if (isGoldenCoin && glow > 0) {
            const g = ctx.createRadialGradient(0, 0, 8, 0, 0, 40 + glow * 15);
            g.addColorStop(0, `rgba(255,215,0,${0.12 * glow})`);
            g.addColorStop(1, 'rgba(255,215,0,0)');
            ctx.beginPath();
            ctx.arc(0, 0, 40 + glow * 15, 0, Math.PI * 2);
            ctx.fillStyle = g;
            ctx.fill();
        }

        const grad = ctx.createRadialGradient(-6, -8, 4, 0, 0, COIN_DRAW_RADIUS);
        if (isGoldenCoin) {
            grad.addColorStop(0, '#fff5aa');
            grad.addColorStop(0.6, '#ffd700');
            grad.addColorStop(1, '#ffaa00');
        } else {
            grad.addColorStop(0, '#ffe066');
            grad.addColorStop(0.6, '#ffd700');
            grad.addColorStop(1, '#b8860b');
        }
        ctx.beginPath();
        ctx.arc(0, 0, COIN_DRAW_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = isGoldenCoin ? '#ff8800' : '#a67c00';
        ctx.lineWidth = 2;
        ctx.stroke();

        if (isGoldenCoin) {
            ctx.fillStyle = '#ff8800';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('★', 0, 0);
        }

        ctx.beginPath();
        ctx.arc(-5, -7, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();
        ctx.restore();
    }

    let particles = [];
    function emitParticles(x, y, count, color, spread = 3, life = 30) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * spread;
            particles.push({
                x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                size: 2 + Math.random() * 5, color, life, maxLife: life
            });
        }
    }
    function emitRainbowExplosion(x, y, count = 50) {
        const rainbowColors = ['#ff2244', '#ff8800', '#ffdd33', '#33ff77', '#00ccff', '#aa44ff'];
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 6;
            particles.push({
                x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                size: 3 + Math.random() * 6, color: rainbowColors[Math.floor(Math.random() * rainbowColors.length)],
                life: 40 + Math.random() * 30, maxLife: 70
            });
        }
    }
    function updateAndDrawParticles(timeScale = 1) {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx * timeScale; p.y += p.vy * timeScale; p.vy += 0.05 * timeScale; p.life -= timeScale;
            const alpha = Math.max(0, p.life / p.maxLife);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    let popups = [];
    function addPopup(x, y, text, color) {
        popups.push({ x, y, text, color, life: 55, maxLife: 55, vy: -1.6 });
    }
    function updateAndDrawPopups(timeScale = 1) {
        for (let i = popups.length - 1; i >= 0; i--) {
            const p = popups[i];
            p.y += p.vy * timeScale; p.vy *= 0.97; p.life -= timeScale;
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.font = 'bold 20px "Press Start 2P", cursive';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = p.color + '80';
            ctx.shadowBlur = 18;
            ctx.fillText(p.text, p.x, p.y);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            if (p.life <= 0) popups.splice(i, 1);
        }
    }

    let flying = null;

    function performThrow(power, aimVX, isDemo = false) {
        if (isThrowing) return;
        isThrowing = true;
        totalThrows++;
        if (!isDemo) { stopDemoMode(); resetIdleTimer(); }
        playThrowSound();
        checkGoldenCoin();
        isCriticalThrow = power > CRITICAL_THRESHOLD;
        if (isCriticalThrow) criticalTrail = [];
        if (isGoldenCoin) addPopup(coinStartX, coinStartY - 55, T.goldPopup, '#ffd700');
        updateStatusVisuals();

        const deskDistance = coinStartY - target.y;
        const minDist = deskDistance * 0.30;
        const maxDist = deskDistance * 1.18;
        const p = Math.max(0, Math.min(100, power)) / 100;
        const travelDist = minDist + (maxDist - minDist) * p;

        const friction = frictionOverride || 0.965;
        const speed = travelDist * (1 - friction);

        flying = { x: coinStartX, y: coinStartY, vx: aimVX, vy: -speed, frame: 0 };
        document.getElementById('power').textContent = Math.floor(power);
    }

    function updateFlying() {
        if (!flying) return;
        const f = flying;

        if (f.frame % 2 === 0) {
            const pScale = getPerspectiveScale(f.y);
            const color = isGoldenCoin ? '#ffd700' : (isCriticalThrow ? '#ff00ff' : '#ffd700');
            emitParticles(f.x, f.y, 2, color, 1.2 * pScale, 20);
        }

        if (isCriticalThrow) {
            criticalTrail.push({ x: f.x, y: f.y, life: 15 });
            const rainbowColors = ['#ff2244', '#ff8800', '#ffdd33', '#33ff77', '#00ccff', '#aa44ff'];
            for (let i = criticalTrail.length - 1; i >= 0; i--) {
                const t = criticalTrail[i];
                t.life--;
                const alpha = t.life / 15;
                ctx.globalAlpha = alpha * 0.6;
                ctx.fillStyle = rainbowColors[i % rainbowColors.length];
                const pScale = getPerspectiveScale(t.y);
                ctx.beginPath();
                ctx.arc(t.x, t.y, 4 * pScale, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                if (t.life <= 0) criticalTrail.splice(i, 1);
            }
        }

        f.x += f.vx;
        f.y += f.vy;

        const friction = frictionOverride || 0.965;
        f.vx *= friction;
        f.vy *= friction;
        f.vx += windForce;

        if (magneticTarget && !bossMode) {
            const dx = target.x - f.x;
            const dy = target.y - f.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0 && dist < 200) {
                f.vx += (dx / dist) * 0.15;
                f.vy += (dy / dist) * 0.15;
            }
        }

        const bounds = getDeskBoundsAtY(f.y);
        const railMargin = 8;
        if (f.x < bounds.left + railMargin) {
            f.x = bounds.left + railMargin;
            f.vx = -f.vx * 0.6;
            emitParticles(f.x, f.y, 6, '#ff9966', 2, 18);
        }
        if (f.x > bounds.right - railMargin) {
            f.x = bounds.right - railMargin;
            f.vx = -f.vx * 0.6;
            emitParticles(f.x, f.y, 6, '#ff9966', 2, 18);
        }
        const farEdge = H * 0.10;
        if (f.y < farEdge) {
            f.y = farEdge;
            f.vy = -f.vy * 0.45;
            emitParticles(f.x, f.y, 8, '#ff6688', 2, 20);
        }
        if (f.y > coinStartY + 10) { f.y = coinStartY + 10; f.vy = -f.vy * 0.3; }

        f.frame++;

        const flyScale = getPerspectiveScale(f.y);
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.scale(flyScale, flyScale * PERSPECTIVE_SQUASH);
        ctx.rotate(f.frame * 0.22);
        drawCoin(0, 0, 0.9 + Math.sin(f.frame * 0.15) * 0.03, 0);
        ctx.restore();

        const speed = Math.hypot(f.vx, f.vy);
        if (speed < 0.35) { landCoin(f.x, f.y); flying = null; }
    }

    function getDistanceToTarget(px, py) {
        const dx = px - target.x;
        const dy = (py - target.y) / PERSPECTIVE_SQUASH;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function checkCoinInRing(landX, landY) {
        if (bossMode) {
            const dist = getDistanceToTarget(landX, landY);
            const coinRadius = getCoinCollisionRadius(landY);
            const bossRadius = getBossHitRadius();
            if (dist + coinRadius < bossRadius) return { label: 'boss', pts: 10, color: bossMode.color };
            return null;
        }
        const centerDist = getDistanceToTarget(landX, landY);
        const coinRadius = getCoinCollisionRadius(landY);
        for (let i = 0; i < RINGS.length; i++) {
            const outerBoundary = RINGS[i].radius * targetScale;
            const innerBoundary = (i + 1 < RINGS.length) ? RINGS[i + 1].radius * targetScale : 0;
            const clearsOuterEdge = (centerDist + coinRadius) < outerBoundary;
            const clearsInnerEdge = innerBoundary === 0 ? true : (centerDist - coinRadius) > innerBoundary;
            if (clearsOuterEdge && clearsInnerEdge) return RINGS[i];
        }
        return null;
    }

    function updateTotalScore() {
        document.getElementById('totalScore').textContent = totalScore;
    }

    function landCoin(x, y) {
        const clamped = clampToDesk(x, y);
        const landX = clamped.x;
        const landY = clamped.y;

        coins.push({ x: landX, y: landY, landedAt: Date.now() });
        emitParticles(landX, landY, 16, '#b8942a', 3, 26);
        playSlide();

        const ringHit = checkCoinInRing(landX, landY);

        if (ringHit) {
            let basePoints = ringHit.pts;

            if (isGoldenCoin) {
                basePoints = 20;
                emitRainbowExplosion(landX, landY, 80);
                addPopup(landX, landY - 50, '⭐ GOLD!', '#ffd700');
                playGold();
            }

            const distToCenter = getDistanceToTarget(landX, landY);
            const perfectThreshold = RINGS[RINGS.length - 1].radius * targetScale * 0.3;
            let isPerfect = false;

            if (!bossMode && distToCenter < perfectThreshold && ringHit.label === 'purple') {
                isPerfect = true;
                triggerCameraShake(15);
                slowMotion = 0.3;
                setTimeout(() => { slowMotion = 1.0; }, 800);
                emitRainbowExplosion(landX, landY, 100);
                addPopup(landX, landY - 70, 'PERFECT!!', '#ff00ff');
                basePoints *= 3;
                playPerfect();
            }

            const now = Date.now();
            comboCount = (now - lastHitTime < 1800) ? comboCount + 1 : 1;
            lastHitTime = now;

            const multiplier = getComboMultiplier();
            const finalPoints = Math.round(basePoints * multiplier * eventMultiplier);

            if (ringHit.label !== 'boss') {
                scores[ringHit.label] += finalPoints;
                document.getElementById(ringHit.label).textContent = scores[ringHit.label];
            }
            totalScore += finalPoints;
            updateTotalScore();

            if (comboCount >= 2) {
                const txt = comboCount >= 5 ? `🔥 ${comboCount}x` : comboCount >= 3 ? `✨ ${comboCount}x` : `${comboCount}x`;
                comboEl.textContent = txt;
                comboEl.className = 'combo show';
                clearTimeout(comboEl._timer);
                comboEl._timer = setTimeout(() => comboEl.className = 'combo', 800);
            }

            if (isCriticalThrow && !isGoldenCoin) {
                addPopup(landX, landY - 90, 'CRITICAL!', '#ff00ff');
                playCritical();
            }

            if (!isPerfect) {
                const particleColor = isGoldenCoin ? '#ffd700' : ringHit.color;
                emitParticles(landX, landY, isGoldenCoin ? 50 : 36, particleColor, isGoldenCoin ? 7 : 5, isGoldenCoin ? 55 : 42);
                emitParticles(landX, landY, 18, '#fff', 3, 24);
                if (ringHit.label !== 'boss') playHit(ringHit.label);
            }

            const popupText = isGoldenCoin ? `+${finalPoints} ⭐` : (multiplier > 1 ? `+${finalPoints} x${multiplier}` : `+${finalPoints}`);
            addPopup(landX, landY - 30, popupText, ringHit.color);

            if (bossMode && ringHit.label === 'boss') {
                bossHealth--;
                emitParticles(landX, landY, 30, bossMode.color, 6, 35);
                addPopup(landX, landY - 50, 'HIT!', bossMode.color);
                playHit('boss');
            }
        } else {
            addPopup(landX, landY - 30, '✗', '#ff6666');
            comboCount = 0;
            comboEl.className = 'combo';
            emitParticles(landX, landY, 10, '#888', 2, 18);
            playMiss();
        }

        isGoldenCoin = false;
        isCriticalThrow = false;
        criticalTrail = [];

        checkBossMode();

        setTimeout(() => {
            isThrowing = false;
            powerValue = 0;
            document.getElementById('power').textContent = '0';
            updateStatusVisuals();
        }, 250);
    }

    const motion = {
        supported: false, active: false, state: 'wait', locked: false, source: null,
        variance: 1, steadyStreak: 0, lastAimSign: 1, lastEventTime: 0
    };

    function readSignal(e) {
        if (motion.source === null) {
            if (e.rotationRate && (e.rotationRate.alpha !== null || e.rotationRate.beta !== null || e.rotationRate.gamma !== null)) {
                motion.source = 'rotation';
            } else if (e.acceleration && e.acceleration.x !== null) {
                motion.source = 'linear';
            } else if (e.accelerationIncludingGravity && e.accelerationIncludingGravity.x !== null) {
                motion.source = 'gravity';
            } else {
                return null;
            }
            if (motion.autoStartTimeout) { clearTimeout(motion.autoStartTimeout); motion.autoStartTimeout = null; }
        }
        if (motion.source === 'rotation') {
            const r = e.rotationRate;
            if (!r || r.alpha === null) return null;
            return { mag: Math.sqrt((r.alpha || 0) ** 2 + (r.beta || 0) ** 2 + (r.gamma || 0) ** 2), aim: r.gamma || 0 };
        }
        const a = motion.source === 'linear' ? e.acceleration : e.accelerationIncludingGravity;
        if (!a || a.x === null) return null;
        return { mag: Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2), aim: a.x || 0 };
    }

    const SOURCE_FLOOR = { rotation: 200, linear: 8, gravity: 3.5 };
    const BASE_MEAN = { rotation: 0, linear: 0, gravity: 9.8 };

    function handleMotion(e) {
        // Feed the phone-dummy indicator regardless of which signal we
        // picked for throw detection - the gravity vector is present in
        // every devicemotion event and gives a stable absolute tilt.
        const g = e.accelerationIncludingGravity;
        if (g && g.x !== null) updatePhoneDummy(g.x, g.y, g.z);

        const now = performance.now();
        const dt = now - motion.lastEventTime;
        motion.lastEventTime = now;

        const sig = readSignal(e);
        if (!sig) return;
        const mag = sig.mag;
        const baseMean = BASE_MEAN[motion.source] ?? 0;

        const stdDev = Math.sqrt(Math.max(motion.variance, 0.0001));
        const delta = mag - baseMean;
        const floor = SOURCE_FLOOR[motion.source] || 6;
        const threshold = Math.max(stdDev * 8, floor);

        if (isThrowing || flying) return;

        if (motion.state === 'wait' || motion.state === 'cooldown') {
            const dev = mag - baseMean;
            const looksSteady = Math.abs(dev) < Math.max(stdDev * 6, floor * 0.6);
            if (looksSteady) {
                if (!motion.locked) {
                    const cappedVariance = Math.min(motion.variance, (floor * 0.5) ** 2);
                    motion.variance = cappedVariance * 0.92 + (dev * dev) * 0.08;
                }
                motion.steadyStreak += dt;
                if (motion.steadyStreak > 500) { motion.state = 'ready'; updateStatusVisuals(); }
            } else {
                motion.steadyStreak = 0;
            }
        } else if (motion.state === 'ready') {
            if (delta > threshold) {
                if (!motion.pendingSince) { motion.pendingSince = now; motion.pendingPeak = delta; return; }
                motion.pendingPeak = Math.max(motion.pendingPeak, delta);
                if (now - motion.pendingSince < 40) return;

                const confirmedDelta = motion.pendingPeak;
                motion.pendingSince = null;
                motion.pendingPeak = 0;

                if (!motion.locked) {
                    if (!motion.maxSeen || confirmedDelta > motion.maxSeen) motion.maxSeen = confirmedDelta;
                    motion.locked = true;
                }
                const power = Math.max(15, Math.min(100, (confirmedDelta / motion.maxSeen) * 100));
                const aimVX = Math.max(-6, Math.min(6, sig.aim * (motion.source === 'rotation' ? 0.06 : 0.9)));
                motion.state = 'cooldown';
                motion.steadyStreak = 0;
                performThrow(power, aimVX);
            } else {
                motion.pendingSince = null;
                motion.pendingPeak = 0;
            }
        }
    }

    function startMotion() {
        motion.supported = true;
        motion.active = true;
        window.addEventListener('devicemotion', handleMotion, true);
        motion.state = 'wait';
        updateStatusVisuals();
    }

    let touchActive = false;
    let touchStartY = 0;

    // ============================================================
    //  Win 3.1 "stop" dialog + demo/attract mode
    //  Shown when the motion sensor never sends usable data. Dismissing
    //  it kicks off an auto-play demo (random power/angle throws on a
    //  timer) like a classic arcade attract screen - the moment the
    //  player actually touches the screen to throw for real, demo mode
    //  stops and control hands back to them.
    // ============================================================
    const win31Dialog = document.getElementById('win31Dialog');
    const win31Msg = document.getElementById('win31Msg');
    function showWin31Dialog() {
        win31Msg.textContent = T.win31Messages[Math.floor(Math.random() * T.win31Messages.length)];
        win31Dialog.classList.add('show');
    }
    function hideWin31Dialog() {
        win31Dialog.classList.remove('show');
    }
    document.getElementById('win31Ok').addEventListener('click', () => {
        hideWin31Dialog();
        startDemoMode();
    });
    document.getElementById('win31Close').addEventListener('click', () => {
        hideWin31Dialog();
        startDemoMode();
    });

    let demoMode = false;
    let demoTimer = null;
    const attractLabelEl = document.getElementById('attractLabel');
    attractLabelEl.addEventListener('animationend', (e) => {
        if (e.animationName === 'attractGlitchOut') attractLabelEl.classList.remove('hide');
    });
    function startDemoMode() {
        clearTimeout(idleTimer);
        demoMode = true;
        attractLabelEl.classList.remove('hide');
        attractLabelEl.classList.add('show');
        scheduleDemoThrow();
    }
    function stopDemoMode() {
        if (!demoMode) return;
        demoMode = false;
        clearTimeout(demoTimer);
        if (attractLabelEl.classList.contains('show')) {
            attractLabelEl.classList.remove('show');
            attractLabelEl.classList.add('hide');
        }
    }
    function scheduleDemoThrow() {
        if (!demoMode) return;
        demoTimer = setTimeout(() => {
            if (!demoMode) return;
            if (!isThrowing && !flying) {
                const randPower = 25 + Math.random() * 75;
                const randAim = (Math.random() * 2 - 1) * 5;
                performThrow(randPower, randAim, true);
            }
            scheduleDemoThrow();
        }, 1600 + Math.random() * 1400);
    }

    // If the player hasn't actually thrown anything within a short idle
    // window, kick off the same attract-mode loop on its own - not just
    // as a fallback for a broken sensor. Any real throw (motion or touch)
    // resets the clock; a real touch also cancels demo mode immediately.
    const IDLE_TIMEOUT_MS = 10000;
    let idleTimer = null;
    function resetIdleTimer() {
        clearTimeout(idleTimer);
        if (demoMode) return;
        idleTimer = setTimeout(() => {
            if (!isThrowing && !flying && !demoMode) startDemoMode();
        }, IDLE_TIMEOUT_MS);
    }

    function fallbackToTouch() {
        motion.supported = false;
        document.getElementById('hint').textContent = T.hintFallback;
        motion.state = 'ready';
        updateStatusVisuals();
        showWin31Dialog();
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', onTouchEnd, { passive: false });
        canvas.addEventListener('mousedown', e => onTouchStart({ preventDefault(){}, touches: [{ clientY: e.clientY }] }));
        canvas.addEventListener('mousemove', e => { if (touchActive) onTouchMove({ preventDefault(){}, touches: [{ clientY: e.clientY }] }); });
        window.addEventListener('mouseup', () => { if (touchActive) onTouchEnd({ preventDefault(){} }); });
    }
    function onTouchStart(e) {
        e.preventDefault();
        stopDemoMode();
        resetIdleTimer();
        if (isThrowing || flying) return;
        touchActive = true;
        touchStartY = e.touches[0].clientY;
        powerValue = 0;
    }
    function onTouchMove(e) {
        e.preventDefault();
        if (!touchActive || isThrowing || flying) return;
        const dy = touchStartY - e.touches[0].clientY;
        powerValue = Math.max(0, Math.min(100, dy * 0.5));
    }
    function onTouchEnd(e) {
        e.preventDefault();
        if (!touchActive) return;
        touchActive = false;
        if (isThrowing || flying) return;
        if (powerValue > 8) performThrow(powerValue, 0);
        else powerValue = 0;
    }

    const AUTO_CLEAN_COUNT = 6;
    function checkAutoClean() {
        if (coins.length >= AUTO_CLEAN_COUNT) {
            const allSettled = coins.every(c => Date.now() - c.landedAt > 400);
            if (allSettled && !isThrowing && !flying) {
                addPopup(W / 2, H * 0.5, T.autoClean, '#ffd700');
                playCleanSound();
                coins.forEach(c => emitParticles(c.x, c.y, 18, '#888', 4, 28));
                coins = [];
                comboCount = 0;
                comboEl.className = 'combo';
                targetTheme = (targetTheme === 'classic') ? 'hkarcade' : 'classic';
            }
        }
    }

    function frame() {
        bgTime += 16 * slowMotion;
        updateTargetPosition();
        updateCameraShake();
        checkEvents();

        ctx.save();
        ctx.translate(cameraShake.x, cameraShake.y);

        drawTable();
        drawTarget();

        coins.forEach(c => drawCoin(c.x, c.y, 0.82, 0));

        if (flying) {
            updateFlying();
        } else if (!isThrowing) {
            const glow = Math.min(powerValue / 100, 1.2);
            drawCoin(coinStartX, coinStartY, 1 + powerValue / 500, glow);
            if (powerValue > 10) {
                const pScale = getPerspectiveScale(coinStartY);
                ctx.beginPath();
                ctx.arc(coinStartX, coinStartY, (26 + powerValue / 5) * pScale, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,215,0,${0.1 + powerValue / 300})`;
                ctx.lineWidth = 2 + powerValue / 40;
                ctx.setLineDash([6, 10]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            document.getElementById('power').textContent = Math.floor(powerValue);
        }

        updateAndDrawParticles(slowMotion);
        updateAndDrawPopups(slowMotion);
        checkAutoClean();

        ctx.restore();

        requestAnimationFrame(frame);
    }

    function init() {
        applyLocale();
        layout();
        computeRings();
        initStars();
        initDeco();
        window.addEventListener('resize', () => { layout(); computeRings(); initStars(); initDeco(); });
        frame();
        resetIdleTimer();
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        document.getElementById('startOverlay').style.display = 'none';
        unlockAudioOnce();
        try {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const state = await DeviceMotionEvent.requestPermission();
                if (state === 'granted') startMotion(); else fallbackToTouch();
            } else if (window.DeviceMotionEvent) {
                startMotion();
            } else {
                fallbackToTouch();
            }
        } catch (err) {
            fallbackToTouch();
        }
    });

    function autoDetectAndStart() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            document.getElementById('startOverlay').style.display = 'flex';
            return;
        }
        if (window.DeviceMotionEvent) {
            startMotion();
            motion.autoStartTimeout = setTimeout(() => {
                if (motion.source === null) {
                    window.removeEventListener('devicemotion', handleMotion, true);
                    fallbackToTouch();
                }
            }, 1200);
        } else {
            fallbackToTouch();
        }
    }

    init();
    autoDetectAndStart();
</script>
</body>
</html>
