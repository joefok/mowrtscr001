<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扔彩虹模擬器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            height: 100vh; width: 100vw; overflow: hidden;
            background: #0a001f; font-family: 'Press Start 2P', cursive;
            color: white; touch-action: none;
        }
        canvas { display: block; }
        .hud {
            position: absolute; top: 12px; left: 12px; z-index: 10;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            font-size: 13px; line-height: 1.4;
        }
        button {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #ffd700; color: #000; border: none; padding: 12px 24px;
            font-family: 'Press Start 2P', cursive; font-size: 14px; cursor: pointer;
            border-radius: 6px; box-shadow: 0 5px 0 #b8860b;
        }
        button:active { transform: translateX(-50%) translateY(3px); box-shadow: 0 2px 0 #b8860b; }
    </style>
</head>
<body>
    <div class="hud" id="hud">
        Red: <span id="red">0</span> Green: <span id="green">0</span><br>
        Yellow: <span id="yellow">0</span> Purple: <span id="purple">0</span><br>
        Power: <span id="power">0</span>
    </div>
    <button onclick="cleanDesk()">🧹 Clean Desk</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        let coins = [];
        let scores = {red:0, green:0, yellow:0, purple:0};
        let coinX, coinY;
        let dragging = false;
        let startX, startY;

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
            coinX = w * 0.25;
            coinY = h * 0.85;
        }

        function drawTarget(x, y) {
            const colors = ['#ff0000','#00ff00','#ffff00','#8b00ff'];
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(x, y, 55 - i*13, 0, Math.PI*2);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
                ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
        }

        function draw(cleaning = false) {
            ctx.fillStyle = '#0f0022'; ctx.fillRect(0,0,w,h);

            // Desk
            ctx.fillStyle = '#3a2a1f';
            ctx.fillRect(0, h*0.45, w, h);

            const grad = ctx.createLinearGradient(0, h*0.4, 0, h);
            grad.addColorStop(0, 'rgba(255,100,200,0.3)');
            grad.addColorStop(1, 'rgba(100,255,255,0.25)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, h*0.4, w, h);

            // Targets
            for (let x = w*0.22; x < w*0.82; x += w*0.3) {
                for (let y = h*0.28; y < h*0.55; y += h*0.23) {
                    drawTarget(x, y);
                }
            }

            // Landed coins
            coins.forEach(c => {
                ctx.save(); ctx.translate(c.x, c.y);
                ctx.fillStyle = cleaning ? '#666' : '#c0a040';
                ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill();
                ctx.restore();
            });

            // Throwing coin
            ctx.save(); ctx.translate(coinX, coinY);
            ctx.fillStyle = '#ffd700';
            ctx.beginPath(); ctx.arc(0,0,24,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#b8860b'; ctx.font = 'bold 32px Arial'; ctx.fillText('🪙', -13, 12);
            ctx.restore();
        }

        function throwCoin(power) {
            let vx = (Math.random() * 5 - 2.5);
            let vy = -power * 0.135;
            let forward = power * 0.11;

            let x = coinX, y = coinY;
            let frame = 0;

            const anim = setInterval(() => {
                draw();
                x += vx;
                y += vy;
                forward *= 0.97;
                vy += 0.5;

                ctx.save();
                ctx.translate(x, y - forward * 0.75);
                ctx.rotate(frame * 0.35);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath(); ctx.arc(0,0,24,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = '#b8860b'; ctx.fillText('🪙', -13, 12);
                ctx.restore();

                frame++;

                if (y > h * 0.9 || forward < 6) {
                    clearInterval(anim);
                    coins.push({x, y: Math.min(h*0.88, y)});

                    // Score
                    let scored = false;
                    for (let tx = w*0.22; tx < w*0.82; tx += w*0.3) {
                        for (let ty = h*0.28; ty < h*0.55; ty += h*0.23) {
                            const d = Math.hypot(tx - x, ty - y);
                            if (d < 78) {
                                if (d < 26) scores.purple++;
                                else if (d < 42) scores.yellow++;
                                else if (d < 58) scores.green++;
                                else scores.red++;
                                scored = true;
                                break;
                            }
                        }
                        if (scored) break;
                    }
                    Object.keys(scores).forEach(k => document.getElementById(k).textContent = scores[k]);

                    setTimeout(() => { coinX = w*0.25; coinY = h*0.85; draw(); }, 1000);
                }
            }, 16);
        }

        function cleanDesk() {
            if (coins.length === 0) return;
            draw(true); // grey out coins
            setTimeout(() => {
                coins = [];
                draw();
            }, 420);
        }

        // Swipe UP to throw
        canvas.addEventListener('pointerdown', e => {
            if (Math.hypot(e.offsetX - coinX, e.offsetY - coinY) < 50) {
                dragging = true;
                startX = e.offsetX;
                startY = e.offsetY;
            }
        });

        canvas.addEventListener('pointerup', e => {
            if (!dragging) return;
            dragging = false;
            const dy = startY - e.offsetY;
            if (dy > 40) {
                const power = Math.min(165, dy * 0.78);
                document.getElementById('power').textContent = Math.floor(power);
                throwCoin(power);
            }
        });

        window.addEventListener('resize', () => { resize(); draw(); });
        resize();
        draw();
    </script>
</body>
</html>
