<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌈 扔彩虹 · 8-bit 狂想</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #0a001f;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            touch-action: none;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD - 霓虹风格 */
        .hud {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            font-size: 11px;
            line-height: 1.6;
            min-width: 140px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            pointer-events: none;
        }
        .hud .title {
            font-size: 13px;
            color: #ffd700;
            margin-bottom: 6px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .hud .row {
            display: flex;
            justify-content: space-between;
            gap: 14px;
        }
        .hud .row span {
            min-width: 30px;
        }
        .hud .score-label {
            opacity: 0.7;
            font-size: 9px;
        }
        .hud .score-val {
            font-size: 13px;
            text-shadow: 0 0 10px currentColor;
        }
        .hud .score-val.red {
            color: #ff4466;
        }
        .hud .score-val.green {
            color: #44ff88;
        }
        .hud .score-val.yellow {
            color: #ffdd44;
        }
        .hud .score-val.purple {
            color: #cc66ff;
        }
        .hud .power-wrap {
            margin-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 4px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
        }
        .hud .power-wrap .power-bar {
            flex: 1;
            margin-left: 8px;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            top: 4px;
        }
        .hud .power-wrap .power-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff8800, #ffdd00);
            border-radius: 4px;
            transition: width 0.1s;
        }

        /* 控制按钮 */
        .controls {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .controls button {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            cursor: pointer;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            touch-action: manipulation;
        }
        .controls button:active {
            transform: scale(0.93);
            background: rgba(255, 215, 0, 0.3);
        }
        .controls button.mute {
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            min-width: 52px;
            padding: 10px 14px;
        }

        /* 连击提示 */
        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            font-size: 52px;
            font-family: 'Press Start 2P', cursive;
            color: #ffdd44;
            text-shadow: 0 0 40px rgba(255, 220, 0, 0.8), 0 0 80px rgba(255, 150, 0, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            letter-spacing: 4px;
        }
        .combo-display.show {
            opacity: 1;
            animation: comboPulse 0.5s ease-out;
        }
        @keyframes comboPulse {
            0% {
                transform: translate(-50%, -50%) scale(0.4);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* 得分弹出 (由canvas绘制，但这里保留样式备用) */
        .toast {
            position: absolute;
            font-family: 'Press Start 2P', cursive;
            pointer-events: none;
            z-index: 10;
            font-size: 18px;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.4);
            }
        }

        @media (max-width: 500px) {
            .hud {
                font-size: 9px;
                padding: 8px 12px;
                top: 8px;
                left: 8px;
                min-width: 110px;
            }
            .hud .title {
                font-size: 10px;
            }
            .controls button {
                font-size: 9px;
                padding: 8px 14px;
            }
            .combo-display {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- HUD -->
    <div class="hud" id="hud">
        <div class="title">✦ 扔彩虹 ✦</div>
        <div class="row">
            <span><span class="score-label">🔴</span> <span class="score-val red" id="red">0</span></span>
            <span><span class="score-label">🟢</span> <span class="score-val green" id="green">0</span></span>
            <span><span class="score-label">🟡</span> <span class="score-val yellow" id="yellow">0</span></span>
            <span><span class="score-label">🟣</span> <span class="score-val purple" id="purple">0</span></span>
        </div>
        <div class="power-wrap">
            <span>⚡<span id="power">0</span></span>
            <div class="power-bar"><div class="fill" id="powerFill"></div></div>
        </div>
    </div>

    <!-- 连击显示 -->
    <div class="combo-display" id="comboDisplay"></div>

    <!-- 控制区 -->
    <div class="controls">
        <button onclick="cleanDesk()">🧹 清桌</button>
        <button class="mute" id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ============================================================
        //  1. CANVAS 基础
        // ============================================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        }
        resize();
        window.addEventListener('resize', () => { resize();
            draw(); });

        // ============================================================
        //  2. 音频引擎 (Web Audio API)
        // ============================================================
        let audioCtx = null;
        let musicInterval = null;
        let isMuted = false;
        let musicActive = false;

        // 音符频率 (C大调)
        const NOTES = {
            C4: 261.63,
            D4: 293.66,
            E4: 329.63,
            F4: 349.23,
            G4: 392.00,
            A4: 440.00,
            B4: 493.88,
            C5: 523.25,
            D5: 587.33,
            E5: 659.25,
            F5: 698.46,
            G5: 783.99,
            A5: 880.00,
            B5: 987.77,
            C6: 1046.50,
        };

        // 旋律序列 (音符名, 持续时间ms)
        const MELODY = [
            { note: 'C5', dur: 150 },
            { note: 'E5', dur: 150 },
            { note: 'G5', dur: 150 },
            { note: 'A5', dur: 200 },
            { note: 'G5', dur: 150 },
            { note: 'E5', dur: 150 },
            { note: 'C5', dur: 200 },
            { note: 'D5', dur: 150 },
            { note: 'F5', dur: 150 },
            { note: 'A5', dur: 150 },
            { note: 'G5', dur: 200 },
            { note: 'F5', dur: 150 },
            { note: 'D5', dur: 150 },
            { note: 'C5', dur: 250 },
        ];

        let melodyIndex = 0;
        let melodyTimer = null;

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.warn('Web Audio not supported');
                    return;
                }
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 播放一个音符 (方波, 带包络)
        function playNote(freq, duration, volume = 0.15, type = 'square') {
            if (!audioCtx || isMuted) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration / 1000 + 0.05);
            } catch (e) { /* 静默忽略 */ }
        }

        // 播放旋律下一个音符
        function playNextMelodyNote() {
            if (!audioCtx || isMuted || !musicActive) return;
            const entry = MELODY[melodyIndex];
            const freq = NOTES[entry.note];
            if (freq) {
                // 主旋律
                playNote(freq, entry.dur, 0.12, 'square');
                // 加一个八度低音 (更厚)
                setTimeout(() => {
                    playNote(freq / 2, entry.dur * 0.7, 0.06, 'sawtooth');
                }, 20);
            }
            melodyIndex = (melodyIndex + 1) % MELODY.length;

            // 定时播放下一个
            const delay = entry.dur + 40;
            if (melodyTimer) clearTimeout(melodyTimer);
            melodyTimer = setTimeout(playNextMelodyNote, delay);
        }

        // 启动/停止背景音乐
        function startMusic() {
            if (!audioCtx) {
                initAudio();
                if (!audioCtx) return;
            }
            if (musicActive) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    musicActive = true;
                    melodyIndex = 0;
                    if (melodyTimer) clearTimeout(melodyTimer);
                    playNextMelodyNote();
                }).catch(() => {});
            } else {
                musicActive = true;
                melodyIndex = 0;
                if (melodyTimer) clearTimeout(melodyTimer);
                playNextMelodyNote();
            }
        }

        function stopMusic() {
            musicActive = false;
            if (melodyTimer) {
                clearTimeout(melodyTimer);
                melodyTimer = null;
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
            if (isMuted) {
                stopMusic();
            } else {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                startMusic();
            }
        }

        // ============================================================
        //  3. 音效
        // ============================================================
        function sfxThrow(power) {
            if (!audioCtx || isMuted) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                const baseFreq = 200 + power * 0.8;
                osc.frequency.setValueAtTime(baseFreq * 0.5, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } catch (e) {}
        }

        function sfxHit(ringIndex) {
            if (!audioCtx || isMuted) return;
            try {
                const freqs = [523, 659, 784, 1047]; // C5, E5, G5, C6
                const freq = freqs[Math.min(ringIndex, freqs.length - 1)] || 659;
                // 主音
                playNote(freq, 120, 0.18, 'square');
                // 泛音
                setTimeout(() => {
                    playNote(freq * 1.25, 80, 0.08, 'square');
                }, 40);
                // 噪声短促
                const osc2 = audioCtx.createOscillator();
                const g2 = audioCtx.createGain();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(freq * 0.7, audioCtx.currentTime);
                g2.gain.setValueAtTime(0.06, audioCtx.currentTime);
                g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc2.connect(g2);
                g2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.12);
            } catch (e) {}
        }

        function sfxScore(combo) {
            if (!audioCtx || isMuted) return;
            try {
                const base = 600 + combo * 30;
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        playNote(base + i * 80, 80, 0.08 - i * 0.015, 'square');
                    }, i * 50);
                }
            } catch (e) {}
        }

        // ============================================================
        //  4. 游戏状态
        // ============================================================
        let coins = [];
        let scores = { red: 0, green: 0, yellow: 0, purple: 0 };
        let coinX, coinY;
        let dragging = false;
        let startX, startY;
        let powerValue = 0;

        // 粒子系统
        let particles = [];
        let scorePopups = [];
        let shakeAmount = 0;
        let comboCount = 0;
        let lastHitTime = 0;
        let comboDisplayEl = document.getElementById('comboDisplay');

        // 星星背景
        let stars = [];
        for (let i = 0; i < 60; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: 0.5 + Math.random() * 1.5,
                speed: 0.2 + Math.random() * 0.8,
                phase: Math.random() * Math.PI * 2
            });
        }

        // ============================================================
        //  5. 粒子系统
        // ============================================================
        function emitParticles(x, y, count, color, spread = 4, life = 60, sizeRange = [3, 10]) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * spread * 1.5;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed * (0.5 + Math.random() * 0.8),
                    vy: Math.sin(angle) * speed * (0.5 + Math.random() * 0.8) - 1,
                    life: life * (0.5 + Math.random() * 0.5),
                    maxLife: life,
                    size: sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]),
                    color: color,
                    gravity: 0.08 + Math.random() * 0.06,
                    decay: 0.97 + Math.random() * 0.02,
                });
            }
        }

        function emitTrail(x, y, count = 5) {
            emitParticles(x, y, count, '#ffd700', 2, 35, [2, 6]);
        }

        function emitHitBurst(x, y, ringColor) {
            const colors = ['#ff4466', '#44ff88', '#ffdd44', '#cc66ff'];
            const c = ringColor || colors[Math.floor(Math.random() * colors.length)];
            emitParticles(x, y, 40, c, 6, 55, [3, 12]);
            emitParticles(x, y, 20, '#ffffff', 3, 30, [1, 4]);
            // 额外金色
            emitParticles(x, y, 15, '#ffd700', 4, 40, [2, 8]);
            // 屏幕震动
            shakeAmount = 6;
        }

        // ============================================================
        //  6. 得分弹出
        // ============================================================
        function addScorePopup(x, y, text, color = '#ffffff') {
            scorePopups.push({
                x,
                y,
                text,
                color,
                life: 80,
                maxLife: 80,
                vy: -2.2,
                size: 22 + Math.random() * 8,
            });
        }

        // ============================================================
        //  7. 核心游戏逻辑
        // ============================================================
        function getTargets() {
            const targets = [];
            for (let tx = W * 0.22; tx < W * 0.82; tx += W * 0.3) {
                for (let ty = H * 0.28; ty < H * 0.55; ty += H * 0.23) {
                    targets.push({ x: tx, y: ty });
                }
            }
            return targets;
        }

        function drawTarget(x, y, glow = false) {
            const colors = ['#ff2244', '#33ff77', '#ffdd33', '#aa44ff'];
            const radii = [55, 42, 29, 16];
            const labels = ['+1', '+2', '+3', '+5'];

            for (let i = 0; i < 4; i++) {
                const r = radii[i];
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                const col = colors[i];
                ctx.fillStyle = col;
                ctx.fill();
                // 发光
                if (glow) {
                    const grad = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 1.4);
                    grad.addColorStop(0, col + '40');
                    grad.addColorStop(1, col + '00');
                    ctx.beginPath();
                    ctx.arc(x, y, r * 1.4, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 内圈小标签
                if (i === 3) {
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('★', x, y + 1);
                }
            }
            // 中心白点
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fill();
        }

        function drawCoin(x, y, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // 光晕
            const grad = ctx.createRadialGradient(0, 0, 8, 0, 0, 38);
            grad.addColorStop(0, 'rgba(255,215,0,0.3)');
            grad.addColorStop(1, 'rgba(255,215,0,0)');
            ctx.beginPath();
            ctx.arc(0, 0, 38, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // 本体
            const g = ctx.createRadialGradient(-6, -8, 4, 0, 0, 26);
            g.addColorStop(0, '#ffe066');
            g.addColorStop(0.6, '#ffd700');
            g.addColorStop(1, '#b8860b');
            ctx.beginPath();
            ctx.arc(0, 0, 24, 0, Math.PI * 2);
            ctx.fillStyle = g;
            ctx.fill();
            ctx.strokeStyle = '#a67c00';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 高光
            ctx.beginPath();
            ctx.arc(-6, -8, 6, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();

            // 文字
            ctx.fillStyle = '#8a6e00';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🪙', 0, 2);

            ctx.restore();
        }

        function drawBackground() {
            // 深空渐变
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0a001f');
            grad.addColorStop(0.5, '#1a0033');
            grad.addColorStop(1, '#0d0d2b');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // 星星
            const time = Date.now() / 1000;
            stars.forEach(s => {
                const x = s.x * W;
                const y = s.y * H;
                const flicker = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
                const alpha = 0.3 + 0.7 * flicker;
                ctx.beginPath();
                ctx.arc(x, y, s.size * (0.5 + 0.5 * flicker), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
                ctx.fill();
                // 星芒
                if (s.size > 1.2) {
                    ctx.shadowColor = 'rgba(255,255,255,0.3)';
                    ctx.shadowBlur = 10;
                }
            });
            ctx.shadowBlur = 0;

            // 桌面
            const deskY = H * 0.48;
            const dg = ctx.createLinearGradient(0, deskY, 0, H);
            dg.addColorStop(0, 'rgba(60,40,30,0.6)');
            dg.addColorStop(0.3, 'rgba(40,28,20,0.8)');
            dg.addColorStop(1, 'rgba(20,14,10,0.9)');
            ctx.fillStyle = dg;
            ctx.fillRect(0, deskY, W, H);

            // 桌面纹理线
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 20; i++) {
                const y = deskY + 20 + i * 18;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y + (i % 3 - 1) * 6);
                ctx.stroke();
            }

            // 桌面边缘发光
            const eg = ctx.createLinearGradient(0, deskY, 0, deskY + 30);
            eg.addColorStop(0, 'rgba(255,200,100,0.08)');
            eg.addColorStop(1, 'rgba(255,200,100,0)');
            ctx.fillStyle = eg;
            ctx.fillRect(0, deskY, W, 30);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // 背景
            drawBackground();

            // 目标 (带发光)
            const targets = getTargets();
            targets.forEach(t => drawTarget(t.x, t.y, true));

            // 已落地的硬币
            coins.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                const g = ctx.createRadialGradient(-4, -4, 4, 0, 0, 20);
                g.addColorStop(0, '#ddcc88');
                g.addColorStop(0.5, '#b8942a');
                g.addColorStop(1, '#7a6210');
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
                ctx.strokeStyle = '#5a4a0a';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // 高光
                ctx.beginPath();
                ctx.arc(-4, -6, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,220,0.3)';
                ctx.fill();
                ctx.restore();
            });

            // 投掷中的硬币
            if (!dragging || powerValue < 5) {
                drawCoin(coinX, coinY, 1);
            } else {
                // 蓄力时放大 + 发光
                const scale = 1 + powerValue / 600;
                drawCoin(coinX, coinY, scale);
                // 蓄力指示光圈
                ctx.beginPath();
                ctx.arc(coinX, coinY, 32 + powerValue / 12, 0, Math.PI * 2);
                const alpha = 0.2 + powerValue / 500;
                ctx.strokeStyle = `rgba(255,215,0,${Math.min(alpha, 0.6)})`;
                ctx.lineWidth = 2 + powerValue / 60;
                ctx.setLineDash([4, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 粒子
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (0.3 + 0.7 * alpha), 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color + '60';
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1;

            // 得分弹出
            scorePopups.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.font = `bold ${p.size}px 'Press Start 2P', cursive`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = p.color + '80';
                ctx.shadowBlur = 20;
                ctx.fillText(p.text, p.x, p.y);
                ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1;

            // 屏幕震动
            if (shakeAmount > 0.1) {
                const sx = (Math.random() - 0.5) * shakeAmount * 1.2;
                const sy = (Math.random() - 0.5) * shakeAmount * 1.2;
                canvas.style.transform = `translate(${sx}px, ${sy}px)`;
                shakeAmount *= 0.92;
            } else {
                canvas.style.transform = 'translate(0,0)';
                shakeAmount = 0;
            }

            // 更新粒子
            updateParticles();
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vx *= 0.99;
                p.vy *= 0.99;
                p.life--;
                p.size *= 0.995;
                if (p.life <= 0 || p.size < 0.3) {
                    particles.splice(i, 1);
                }
            }
            for (let i = scorePopups.length - 1; i >= 0; i--) {
                const p = scorePopups[i];
                p.y += p.vy;
                p.vy *= 0.98;
                p.life--;
                if (p.life <= 0) {
                    scorePopups.splice(i, 1);
                }
            }
        }

        // ============================================================
        //  8. 投掷逻辑
        // ============================================================
        function throwCoin(power) {
            const vx = (Math.random() * 4 - 2);
            const vy = -power * 0.13 - 2;
            let forward = power * 0.10 + 3;

            let x = coinX,
                y = coinY;
            let frame = 0;
            const trailInterval = setInterval(() => {
                if (frame % 2 === 0) emitTrail(x, y, 3);
            }, 30);

            const anim = setInterval(() => {
                draw();
                x += vx;
                y += vy;
                forward *= 0.975;
                vy += 0.45;

                // 绘制飞行中的硬币
                ctx.save();
                ctx.translate(x, y - forward * 0.6);
                ctx.rotate(frame * 0.4 + power * 0.01);
                drawCoin(0, 0, 0.9 + Math.sin(frame * 0.2) * 0.05);
                ctx.restore();

                frame++;

                if (y > H * 0.92 || forward < 2 || x < -50 || x > W + 50) {
                    clearInterval(anim);
                    clearInterval(trailInterval);

                    const landY = Math.min(H * 0.88, y);
                    const landX = Math.max(10, Math.min(W - 10, x));
                    coins.push({ x: landX, y: landY });

                    // 落地粒子
                    emitParticles(landX, landY, 18, '#b8942a', 3, 35, [2, 7]);

                    // 检测得分
                    let scored = false;
                    let ringIndex = -1;
                    const targets = getTargets();
                    for (let tx = W * 0.22; tx < W * 0.82; tx += W * 0.3) {
                        for (let ty = H * 0.28; ty < H * 0.55; ty += H * 0.23) {
                            const d = Math.hypot(tx - landX, ty - landY);
                            if (d < 78) {
                                const rings = [
                                    { r: 55, label: 'red', pts: 1, color: '#ff4466' },
                                    { r: 42, label: 'green', pts: 2, color: '#44ff88' },
                                    { r: 29, label: 'yellow', pts: 3, color: '#ffdd44' },
                                    { r: 16, label: 'purple', pts: 5, color: '#cc66ff' },
                                ];
                                for (let ri = 0; ri < rings.length; ri++) {
                                    if (d < rings[ri].r) {
                                        ringIndex = ri;
                                        const r = rings[ri];
                                        scores[r.label] += r.pts;
                                        document.getElementById(r.label).textContent = scores[r.label];
                                        scored = true;

                                        // 连击
                                        const now = Date.now();
                                        if (now - lastHitTime < 1500) {
                                            comboCount++;
                                        } else {
                                            comboCount = 1;
                                        }
                                        lastHitTime = now;

                                        // 连击显示
                                        if (comboCount >= 2) {
                                            const comboText = comboCount >= 5 ? `🔥 ${comboCount}x` :
                                                comboCount >= 3 ? `✨ ${comboCount}x` : `${comboCount}x`;
                                            comboDisplayEl.textContent = comboText;
                                            comboDisplayEl.className = 'combo-display show';
                                            clearTimeout(comboDisplayEl._hideTimer);
                                            comboDisplayEl._hideTimer = setTimeout(() => {
                                                comboDisplayEl.className = 'combo-display';
                                            }, 800);
                                            sfxScore(comboCount);
                                        } else {
                                            sfxHit(ri);
                                        }

                                        // 爆炸粒子
                                        emitHitBurst(landX, landY, r.color);
                                        // 得分弹出
                                        const label = ['+1', '+2', '+3', '+5'][ri];
                                        addScorePopup(landX, landY - 30, label, r.color);

                                        // 更新HUD
                                        document.getElementById('power').textContent = '💥';
                                        break;
                                    }
                                }
                                break;
                            }
                        }
                        if (scored) break;
                    }

                    if (!scored) {
                        // 未命中
                        addScorePopup(landX, landY - 30, '✗', '#ff6666');
                        comboCount = 0;
                        comboDisplayEl.className = 'combo-display';
                        // 落点灰粒子
                        emitParticles(landX, landY, 12, '#888888', 2, 25, [2, 5]);
                    }

                    // 重置硬币位置
                    setTimeout(() => {
                        coinX = W * 0.25;
                        coinY = H * 0.85;
                        document.getElementById('power').textContent = '0';
                        document.getElementById('powerFill').style.width = '0%';
                        draw();
                    }, 400);
                }
            }, 16);
        }

        // ============================================================
        //  9. 交互 (触摸 + 鼠标)
        // ============================================================
        function getPos(e) {
            if (e.touches) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const pos = getPos(e);
            return {
                x: pos.x - rect.left,
                y: pos.y - rect.top
            };
        }

        function isOnCoin(pos) {
            const dx = pos.x - coinX;
            const dy = pos.y - coinY;
            return (dx * dx + dy * dy) < 3600; // 60px radius
        }

        function handlePointerDown(e) {
            e.preventDefault();
            if (!audioCtx) {
                initAudio();
                if (audioCtx) {
                    audioCtx.resume().then(() => {
                        startMusic();
                    }).catch(() => {});
                }
            }
            if (!musicActive && !isMuted) {
                startMusic();
            }

            const pos = getCanvasPos(e);
            if (isOnCoin(pos)) {
                dragging = true;
                startX = pos.x;
                startY = pos.y;
                powerValue = 0;
                document.getElementById('power').textContent = '0';
                document.getElementById('powerFill').style.width = '0%';
            }
        }

        function handlePointerMove(e) {
            e.preventDefault();
            if (!dragging) return;
            const pos = getCanvasPos(e);
            const dy = startY - pos.y;
            powerValue = Math.min(180, Math.max(0, dy * 0.7));
            document.getElementById('power').textContent = Math.floor(powerValue);
            document.getElementById('powerFill').style.width = (powerValue / 180 * 100) + '%';
            // 拖动时粒子尾迹
            if (powerValue > 20 && Math.random() < 0.3) {
                emitTrail(coinX, coinY, 1);
            }
            draw();
        }

        function handlePointerUp(e) {
            e.preventDefault();
            if (!dragging) return;
            dragging = false;
            if (powerValue > 35) {
                sfxThrow(powerValue);
                throwCoin(powerValue);
                document.getElementById('power').textContent = '⚡';
            } else {
                document.getElementById('power').textContent = '0';
                document.getElementById('powerFill').style.width = '0%';
                draw();
            }
            powerValue = 0;
        }

        // 鼠标事件
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('mousemove', handlePointerMove);
        canvas.addEventListener('mouseup', handlePointerUp);
        canvas.addEventListener('mouseleave', (e) => {
            if (dragging) handlePointerUp(e);
        });

        // 触摸事件
        canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
        canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
        canvas.addEventListener('touchend', handlePointerUp, { passive: false });
        canvas.addEventListener('touchcancel', handlePointerUp, { passive: false });

        // ============================================================
        //  10. 清理桌面
        // ============================================================
        function cleanDesk() {
            if (coins.length === 0) return;
            // 清空粒子
            particles = [];
            // 动画清空
            coins.forEach(c => {
                emitParticles(c.x, c.y, 20, '#888888', 4, 30, [2, 6]);
            });
            setTimeout(() => {
                coins = [];
                draw();
            }, 300);
            // 重置连击
            comboCount = 0;
            comboDisplayEl.className = 'combo-display';
            // 小音效
            if (!isMuted && audioCtx) {
                try {
                    playNote(440, 80, 0.06, 'square');
                    setTimeout(() => playNote(330, 80, 0.06, 'square'), 120);
                } catch (e) {}
            }
        }

        // 暴露到全局
        window.cleanDesk = cleanDesk;
        window.toggleMute = toggleMute;

        // ============================================================
        //  11. 初始化和动画循环
        // ============================================================
        function init() {
            coinX = W * 0.25;
            coinY = H * 0.85;
            draw();

            // 初始星星装饰
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    if (!dragging) {
                        const x = W * 0.1 + Math.random() * W * 0.8;
                        const y = H * 0.05 + Math.random() * H * 0.35;
                        emitParticles(x, y, 2, '#ffd700', 1, 40, [1, 3]);
                    }
                }, i * 200);
            }

            // 启动动画循环
            function animate() {
                if (!dragging) {
                    draw();
                }
                // 持续更新粒子
                if (particles.length > 0 || scorePopups.length > 0) {
                    if (!dragging) draw();
                }
                requestAnimationFrame(animate);
            }
            animate();

            // 自动启动音乐 (需要用户交互，但首次点击会触发)
            // 加一个提示
            setTimeout(() => {
                if (!audioCtx) {
                    // 显示提示
                }
            }, 1000);
        }

        // 处理窗口变化
        window.addEventListener('resize', () => {
            resize();
            // 调整硬币位置
            if (coinX > W) coinX = W * 0.25;
            if (coinY > H) coinY = H * 0.85;
            draw();
        });

        // 启动
        init();

        // 如果用户点击页面任何地方，尝试启动音频
        document.addEventListener('click', () => {
            if (!audioCtx) {
                initAudio();
                if (audioCtx) {
                    audioCtx.resume().then(() => {
                        if (!isMuted) startMusic();
                    }).catch(() => {});
                }
            }
        }, { once: false });

        // 防浏览器休眠
        console.log('🌈 扔彩虹 · 8-bit 狂想版 loaded!');
    </script>
