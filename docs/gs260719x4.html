<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扔彩虹模擬器 | Coin Toss Rainbow Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0; height: 100vh; overflow: hidden;
            background: linear-gradient(#1a0033, #330066, #660033);
            font-family: 'Press Start 2P', cursive;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game {
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 25px;
            border: 8px solid #ffd700;
            border-radius: 20px;
            box-shadow: 0 0 60px #ff00ff;
        }

        canvas {
            background: linear-gradient(to bottom, #111, #2a004d);
            border: 5px solid #ffff00;
            border-radius: 12px;
            box-shadow: inset 0 0 80px rgba(255, 0, 255, 0.4);
        }

        .stats { margin: 15px 0; font-size: 15px; }
        .result { font-size: 24px; min-height: 70px; margin-top: 15px; text-shadow: 0 0 15px #ffff00; }
    </style>
</head>
<body>
    <div class="game">
        <h1>🌈 扔彩虹模擬器 🌈</h1>
        <p style="font-size:13px;">Made in Hong Kong • Toss & Test Your Luck</p>
        
        <div class="stats">
            Balance: <span id="balance">0</span> 🪙 &nbsp;&nbsp; 
            Streak: <span id="streak">0</span>
        </div>

        <canvas id="canvas" width="480" height="360"></canvas>
        
        <div class="result" id="result">Swipe the coin to toss!</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let balance = parseInt(localStorage.getItem('rainbowBalance') || 0);
        let streak = 0;

        let coinX = 140, coinY = 220;
        let isDragging = false;
        let startX, startY;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Rainbow floor
            const grad = ctx.createLinearGradient(0, 180, 0, 360);
            grad.addColorStop(0, '#ff00ff');
            grad.addColorStop(0.5, '#00ffff');
            grad.addColorStop(1, '#ffff00');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 180, canvas.width, canvas.height);

            // Coin
            ctx.save();
            ctx.translate(coinX, coinY);
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(0, 0, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#b8860b';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🪙', 0, 18);
            ctx.restore();
        }

        function toss(power, angle) {
            let x = coinX, y = coinY;
            let vx = power * Math.cos(angle) * 0.9;
            let vy = power * Math.sin(angle) * -0.8;

            let frame = 0;
            const anim = setInterval(() => {
                draw();
                x += vx;
                y += vy;
                vy += 0.6; // gravity

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(frame * 0.4);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(0,0,35,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#b8860b';
                ctx.font = 'bold 50px Arial';
                ctx.fillText('🪙', 0, 18);
                ctx.restore();

                frame++;

                if (y > 340) {
                    clearInterval(anim);
                    const isWin = Math.random() < 0.5 + (power > 70 ? 0.1 : 0);
                    
                    if (isWin) {
                        streak++;
                        const prize = Math.floor(15 + power * 0.8 + streak * 3);
                        balance += prize;
                        document.getElementById('result').innerHTML = `🎉 HEADS WIN! +${prize} 🪙`;
                    } else {
                        streak = 0;
                        document.getElementById('result').innerHTML = `🌈 TAILS...`;
                    }

                    document.getElementById('balance').textContent = balance;
                    document.getElementById('streak').textContent = streak;
                    localStorage.setItem('rainbowBalance', balance);

                    setTimeout(() => {
                        coinX = 140; coinY = 220;
                        draw();
                    }, 1400);
                }
            }, 20);
        }

        // Swipe controls
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            if (Math.hypot(mx - coinX, e.clientY - rect.top - coinY) < 50) {
                isDragging = true;
                startX = mx;
                startY = e.clientY - rect.top;
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (!isDragging) return;
            isDragging = false;
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;
            
            const power = Math.min(95, Math.hypot(startX - endX, startY - endY) * 0.6);
            const angle = Math.atan2(endY - startY, endX - startX);
            
            toss(power, angle);
        });

        // Touch support
        canvas.addEventListener('touchstart', e => { /* similar logic as mouse */ });
        canvas.addEventListener('touchend', e => { /* similar */ });

        // Right click to zoom (as in original game)
        canvas.addEventListener('contextmenu', e => {
            e.preventDefault();
            canvas.style.transform = canvas.style.transform === 'scale(1.6)' ? 'scale(1)' : 'scale(1.6)';
        });

        draw();
        document.getElementById('balance').textContent = balance;
    </script>
</body>
</html>
