<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扔彩虹模擬器 | Coin Toss Rainbow Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            margin:0; height:100vh; overflow:hidden;
            background:#111; font-family:'Press Start 2P', cursive; color:white;
            display:flex; justify-content:center; align-items:center;
        }
        .game { position:relative; }
        canvas { background:#f0f0f0; border:8px solid #ffd700; image-rendering:pixelated; }
        .hud {
            position:absolute; top:15px; left:15px; background:rgba(0,0,0,0.7);
            padding:10px; border-radius:8px; font-size:13px; line-height:1.4;
        }
    </style>
</head>
<body>
    <div class="game">
        <div class="hud" id="hud">
            Red: <span id="red">0</span><br>
            Green: <span id="green">0</span><br>
            Yellow: <span id="yellow">0</span><br>
            Purple: <span id="purple">0</span><br><br>
            Toss Power: <span id="power">0</span><br>
            Coins Tossed: <span id="tossed">0</span>
        </div>
        <canvas id="canvas" width="800" height="520"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let coins = [];
        let scores = {red:0, green:0, yellow:0, purple:0};
        let tossed = 0;
        let dragging = false;
        let startX, startY, coinX = 100, coinY = 400;

        function drawTarget(x, y) {
            const colors = ['#ff0000', '#00ff00', '#ffff00', '#8b00ff'];
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(x, y, 55 - i*13, 0, Math.PI*2);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            // Grid of targets
            for (let x = 140; x < 700; x += 170) {
                for (let y = 90; y < 420; y += 160) {
                    drawTarget(x, y);
                }
            }

            // Existing landed coins
            coins.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.fillStyle = '#c0a040';
                ctx.beginPath();
                ctx.arc(0,0,14,0,Math.PI*2);
                ctx.fill();
                ctx.restore();
            });

            // Current coin
            ctx.save();
            ctx.translate(coinX, coinY);
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(0,0,18,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#b8860b';
            ctx.font = 'bold 22px Arial';
            ctx.fillText('🪙', -8, 8);
            ctx.restore();
        }

        function getScore(x, y) {
            // Find nearest target and ring
            let minDist = Infinity;
            let color = 'miss';
            
            const targets = [];
            for (let tx = 140; tx < 700; tx += 170) {
                for (let ty = 90; ty < 420; ty += 160) {
                    const d = Math.hypot(tx - x, ty - y);
                    if (d < minDist) {
                        minDist = d;
                        if (d < 22) color = 'purple';
                        else if (d < 38) color = 'yellow';
                        else if (d < 52) color = 'green';
                        else if (d < 68) color = 'red';
                    }
                }
            }
            
            if (color !== 'miss') {
                scores[color]++;
                document.getElementById(color).textContent = scores[color];
            }
        }

        // Swipe throw
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            if (Math.hypot(mx-coinX, my-coinY) < 30) {
                dragging = true;
                startX = mx; startY = my;
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (!dragging) return;
            dragging = false;
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;
            
            const power = Math.min(110, Math.hypot(startX-endX, startY-endY) * 0.45);
            document.getElementById('power').textContent = Math.floor(power);
            
            let vx = (startX - endX) * 0.085;
            let vy = (startY - endY) * 0.085;
            
            let x = coinX, y = coinY;
            let frame = 0;
            
            const anim = setInterval(() => {
                draw();
                x += vx; y += vy; vy += 0.35;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(frame*0.3);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = '#b8860b';
                ctx.fillText('🪙', -8, 8);
                ctx.restore();
                
                frame++;
                
                if (y > 500) {
                    clearInterval(anim);
                    coins.push({x, y: Math.min(500, y)});
                    tossed++;
                    document.getElementById('tossed').textContent = tossed;
                    getScore(x, y);
                    coinX = 100; coinY = 400;
                    draw();
                }
            }, 16);
        });

        draw();
    </script>
</body>
</html>
