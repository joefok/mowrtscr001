<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扔彩虹模擬器 | Rainbow Coin Toss</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin:0; padding:0; height:100vh; overflow:hidden;
            background: linear-gradient(to bottom, #3a2f1e, #5c4a2e); /* wooden desk */
            font-family: 'Press Start 2P', cursive; color:white;
            display:flex; justify-content:center; align-items:center;
        }

        .game {
            position:relative;
            background: linear-gradient(135deg, 
                rgba(255,0,0,0.3), rgba(255,127,0,0.3), 
                rgba(255,255,0,0.3), rgba(0,255,0,0.3), 
                rgba(0,0,255,0.3));
            padding:20px; border-radius:20px; box-shadow:0 0 50px rgba(255,255,255,0.4);
        }

        canvas { 
            background: #2c2118; 
            border:6px solid #d4af37; 
            border-radius:12px; 
            box-shadow:0 10px 30px rgba(0,0,0,0.6);
        }

        .stats {
            display:flex; justify-content:space-around; margin:12px 0; font-size:14px; background:rgba(0,0,0,0.5); padding:8px; border-radius:8px;
        }
        .result { font-size:21px; min-height:55px; margin-top:10px; text-shadow:0 0 10px white; }
    </style>
</head>
<body>
    <div class="game">
        <h1 style="text-align:center;margin:8px;">🌈 扔彩虹模擬器 🌈</h1>
        <p style="text-align:center;font-size:13px;margin-bottom:10px;">Swipe the coin toward the rainbow!</p>
        
        <div class="stats">
            <div>Balance: <span id="balance">0</span> 🪙</div>
            <div>Streak: <span id="streak">0</span></div>
            <div>Best: <span id="best">0</span></div>
        </div>

        <canvas id="canvas" width="520" height="420"></canvas>

        <div class="result" id="result"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let balance = parseInt(localStorage.getItem('rainbowBalance')||'0');
        let streak = 0, bestStreak = parseInt(localStorage.getItem('rainbowBest')||'0');

        let coinX = 120, coinY = 280;
        let isDragging = false;
        let startX, startY;

        function drawScene(arrowX = null, arrowY = null) {
            ctx.clearRect(0,0,canvas.width,canvas.height);

            // Half rainbow desk surface
            const grad = ctx.createLinearGradient(0, 100, 0, 420);
            grad.addColorStop(0, '#ff0000');
            grad.addColorStop(0.2, '#ff7f00');
            grad.addColorStop(0.4, '#ffff00');
            grad.addColorStop(0.6, '#00ff00');
            grad.addColorStop(0.8, '#0000ff');
            grad.addColorStop(1, '#8b00ff');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 150, canvas.width, canvas.height - 140);

            // Rainbow target
            const cx = 360, cy = 190;
            const rings = ['#ff0000','#ff7f00','#ffff00','#00ff00','#0000ff','#4b0082'];
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.arc(cx, cy, 110 - i*18, 0, Math.PI*2);
                ctx.fillStyle = rings[i];
                ctx.fill();
            }
            ctx.beginPath();
            ctx.arc(cx, cy, 65, 0, Math.PI*2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 12;
            ctx.stroke();

            // Coin
            ctx.save();
            ctx.translate(coinX, coinY);
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(0,0,28,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#b8860b';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🪙', 0, 12);
            ctx.restore();

            // Drag arrow
            if (arrowX && isDragging) {
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(coinX, coinY);
                ctx.lineTo(arrowX, arrowY);
                ctx.stroke();
                
                ctx.fillStyle = '#ffff00';
                const angle = Math.atan2(arrowY-coinY, arrowX-coinX);
                ctx.save();
                ctx.translate(arrowX, arrowY);
                ctx.rotate(angle);
                ctx.fillText('→', 0, 8);
                ctx.restore();
            }
        }

        function throwCoin(startX, startY, endX, endY) {
            const dx = startX - endX;
            const dy = startY - endY;
            let vx = dx * 0.12;
            let vy = dy * 0.12 - 6; // upward boost

            let x = coinX, y = coinY;
            let frame = 0;

            const anim = setInterval(() => {
                drawScene();
                x += vx;
                y += vy;
                vy += 0.42; // gravity

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(frame * 0.3);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(0,0,28,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#b8860b';
                ctx.font = 'bold 36px Arial';
                ctx.fillText('🪙', 0, 12);
                ctx.restore();

                frame++;

                if (y > 380) {
                    clearInterval(anim);
                    const cx = 360, cy = 190;
                    const dist = Math.hypot(x - cx, y - cy - 30);

                    let prize = 0;
                    let msg = '';

                    if (dist < 58) {
                        prize = Math.floor(60 + Math.abs(dx) * 0.6);
                        balance += prize;
                        streak++;
                        msg = `🌈 PERFECT CENTER! +${prize}`;
                    } else if (dist < 105) {
                        prize = Math.floor(25 + Math.abs(dx) * 0.3);
                        balance += prize;
                        streak = Math.max(0, streak-1);
                        msg = `⚠️ BORDER! +${prize}`;
                    } else {
                        streak = 0;
                        msg = `💥 MISSED THE RAINBOW`;
                    }

                    if (streak > bestStreak) bestStreak = streak;

                    document.getElementById('result').innerHTML = msg;
                    document.getElementById('balance').textContent = balance;
                    document.getElementById('streak').textContent = streak;
                    document.getElementById('best').textContent = bestStreak;

                    // Save
                    localStorage.setItem('rainbowBalance', balance);
                    localStorage.setItem('rainbowBest', bestStreak);

                    // Reset coin
                    setTimeout(() => {
                        coinX = 120; coinY = 280;
                        drawScene();
                    }, 1200);
                }
            }, 16);
        }

        // Mouse / Touch Controls
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            if (Math.hypot(mx - coinX, my - coinY) < 40) {
                isDragging = true;
                startX = mx; startY = my;
            }
        });

        canvas.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            drawScene(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('mouseup', e => {
            if (!isDragging) return;
            isDragging = false;
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;
            throwCoin(startX, startY, endX, endY);
        });

        // Touch support
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const mx = touch.clientX - rect.left;
            const my = touch.clientY - rect.top;
            if (Math.hypot(mx - coinX, my - coinY) < 40) {
                isDragging = true;
                startX = mx; startY = my;
            }
        });

        canvas.addEventListener('touchmove', e => {
            if (!isDragging) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            drawScene(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        canvas.addEventListener('touchend', e => {
            if (!isDragging) return;
            isDragging = false;
            const rect = canvas.getBoundingClientRect();
            const touch = e.changedTouches[0];
            const endX = touch.clientX - rect.left;
            const endY = touch.clientY - rect.top;
            throwCoin(startX, startY, endX, endY);
        });

        // Initial draw
        drawScene();
        document.getElementById('balance').textContent = balance;
        document.getElementById('streak').textContent = streak;
        document.getElementById('best').textContent = bestStreak;
    </script>
</body>
</html>
