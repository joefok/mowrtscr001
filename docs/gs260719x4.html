<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌈 扔彩虹模擬器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; touch-action:none; }
        body {
            height: 100vh; width: 100vw; overflow: hidden;
            background: #0a001f; font-family: 'Press Start 2P', cursive;
            color: #fff;
        }
        canvas { display: block; }
        .hud {
            position: absolute; top: 12px; left: 12px; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="hud" id="hud">
        Red: <span id="red">0</span> 
        Green: <span id="green">0</span><br>
        Yellow: <span id="yellow">0</span> 
        Purple: <span id="purple">0</span><br>
        Power: <span id="power">0</span>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        let coins = [];
        let scores = {red:0, green:0, yellow:0, purple:0};
        let coinX, coinY;
        let dragging = false;
        let startY = 0;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            coinX = W * 0.25;
            coinY = H * 0.82;
        }

        function drawTarget(x, y) {
            const colors = ['#ff0000','#00ff00','#ffff00','#8b00ff'];
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(x, y, 55 - i*13, 0, Math.PI*2);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
                ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
        }

        function draw() {
            ctx.fillStyle = '#0a001f'; ctx.fillRect(0,0,W,H);

            // Desk with depth
            ctx.fillStyle = '#2a1a0f';
            ctx.fillRect(0, H*0.42, W, H);

            // Rainbow floor gradient
            const g = ctx.createLinearGradient(0, H*0.4, 0, H);
            g.addColorStop(0, 'rgba(255,100,255,0.25)');
            g.addColorStop(1, 'rgba(100,255,255,0.3)');
            ctx.fillStyle = g;
            ctx.fillRect(0, H*0.4, W, H);

            // Rainbow targets (3-meter zone)
            for (let x = W*0.22; x < W*0.82; x += W*0.29) {
                for (let y = H*0.26; y < H*0.52; y += H*0.23) {
                    drawTarget(x, y);
                }
            }

            // Landed coins
            coins.forEach(c => {
                ctx.fillStyle = '#c0a040';
                ctx.beginPath(); ctx.arc(c.x, c.y, 16, 0, Math.PI*2); ctx.fill();
            });

            // Throwing coin
            ctx.fillStyle = '#ffd700';
            ctx.beginPath(); ctx.arc(coinX, coinY, 24, 0, Math.PI*2); ctx.fill();
        }

        function throwCoin(power) {
            let vx = (Math.random() * 3 - 1.5);
            let vy = -power * 0.14;       // upward arc
            let forwardSpeed = power * 0.105; // forward distance

            let x = coinX, y = coinY;
            let frame = 0;

            const anim = setInterval(() => {
                draw();
                x += vx;
                y += vy;
                forwardSpeed *= 0.975;
                vy += 0.46; // gravity

                ctx.fillStyle = '#ffd700';
                ctx.beginPath(); ctx.arc(x, y - forwardSpeed*0.7, 24, 0, Math.PI*2); ctx.fill();

                frame++;

                if (y > H * 0.88 || forwardSpeed < 5) {
                    clearInterval(anim);
                    const landY = Math.min(H * 0.85, y);
                    coins.push({x, y: landY});

                    // Score
                    let hit = false;
                    for (let tx = W*0.22; tx < W*0.82; tx += W*0.29) {
                        for (let ty = H*0.26; ty < H*0.52; ty += H*0.23) {
                            if (Math.hypot(tx - x, ty - landY) < 72) {
                                scores.red++;
                                document.getElementById('red').textContent = scores.red;
                                hit = true;
                                break;
                            }
                        }
                        if (hit) break;
                    }

                    setTimeout(() => {
                        coinX = W * 0.25;
                        coinY = H * 0.82;
                        draw();
                    }, 800);
                }
            }, 16);
        }

        // Swipe UP to throw outward
        canvas.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            if (Math.hypot(x - coinX, y - coinY) < 55) {
                dragging = true;
                startY = y;
            }
        });

        canvas.addEventListener('touchend', e => {
            if (!dragging) return;
            dragging = false;
            const touch = e.changedTouches[0];
            const rect = canvas.getBoundingClientRect();
            const endY = touch.clientY - rect.top;
            const swipeUpDistance = startY - endY;

            if (swipeUpDistance > 35) {
                const power = Math.min(165, swipeUpDistance * 0.82);
                document.getElementById('power').textContent = Math.floor(power);
                throwCoin(power);
            }
        });

        window.addEventListener('resize', () => { resize(); draw(); });
        resize();
        draw();
    </script>
</body>
</html>
